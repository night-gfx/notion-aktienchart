name: Update data and deploy dashboard

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "index.html"
      - "requirements.txt"
      - "scripts/**"
      - ".github/workflows/**"
  schedule:
    # Runs roughly once per hour; schedule timing is controlled by GitHub.
    - cron: "17 * * * *"

permissions:
  contents: write
  issues: write
  pages: write
  id-token: write

concurrency:
  group: "commodity-dashboard"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download commodity data
        run: python scripts/update_commodities.py
      
      - name: Transform data for dynamic indexing
        run: python scripts/transform_series.py

      - name: Check open GitHub price alerts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/check_price_alerts.py

      - name: Commit refreshed data when changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/commodities.json data/commodities_transformed.json
          git diff --cached --quiet || git commit -m "Update commodity data"
          git push

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload current website
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
