<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rohstoffvergleich</title>

  <!-- Fixed Lightweight Charts™ version. -->
  <script src="https://cdn.jsdelivr.net/npm/lightweight-charts@5.2.0/dist/lightweight-charts.standalone.production.js"></script>

  <style>
    :root {
      --bg: #ffffff;
      --panel: #f8fafc;
      --border: #d8dee8;
      --text: #172033;
      --muted: #64748b;
      --primary: #1d4ed8;
      --primary-hover: #1e40af;
    }

    * { box-sizing: border-box; }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
    }

    body { overflow: hidden; }

    .app {
      display: flex;
      flex-direction: column;
      width: 100%;
      height: 100vh;
    }

    .controls {
      flex: 0 0 auto;
      max-height: 410px;
      overflow-y: auto;
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
      background: var(--panel);
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px 10px;
      margin-bottom: 10px;
    }

    button {
      min-height: 31px;
      padding: 5px 9px;
      border: 1px solid #c7d0dd;
      border-radius: 6px;
      background: #ffffff;
      color: var(--text);
      font: inherit;
      font-size: 13px;
      cursor: pointer;
    }

    button:hover { background: #eef2f7; }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.55;
    }

    button:disabled:hover { background: #ffffff; }

    .primary {
      border-color: var(--primary);
      background: var(--primary);
      color: #ffffff;
    }

    .primary:hover { background: var(--primary-hover); }

    .control-label {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 31px;
      font-size: 13px;
      white-space: nowrap;
      cursor: pointer;
    }

    .period-box,
    .mode-box {
      display: inline-flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 5px;
      padding: 5px 6px;
      border: 1px solid var(--border);
      border-radius: 7px;
      background: #ffffff;
    }

    .period-title,
    .mode-title {
      margin-right: 3px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .period-button {
      min-height: 24px;
      padding: 2px 6px;
      border: 1px solid transparent;
      border-radius: 4px;
      background: transparent;
      font-size: 12px;
    }

    .period-button:hover { background: #eef2f7; }

    .period-button.active {
      border-color: #bfdbfe;
      background: #dbeafe;
      color: #1d4ed8;
      font-weight: 700;
    }

    .basis-button {
      min-width: 152px;
      text-align: left;
    }

    .groups {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(235px, 1fr));
      gap: 9px;
    }

    details {
      padding: 8px 9px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #ffffff;
    }

    summary {
      cursor: pointer;
      font-size: 13px;
      font-weight: 700;
      user-select: none;
    }

    .group-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin: 8px 0;
    }

    .group-actions button {
      min-height: 25px;
      padding: 3px 7px;
      font-size: 11px;
    }

    .commodity-list {
      display: grid;
      gap: 5px;
    }

    .commodity-item {
      display: flex;
      align-items: center;
      gap: 7px;
      min-height: 27px;
      padding: 4px 6px;
      border-left: 5px solid var(--series-color);
      border-radius: 4px;
      background: #fbfcfe;
      cursor: pointer;
      font-size: 12px;
    }

    .commodity-item:hover { background: #f0f4f8; }

    .ticker {
      color: var(--muted);
      font-size: 10px;
    }

    .status {
      margin-top: 10px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.4;
    }

    .chart-shell {
      position: relative;
      flex: 1 1 auto;
      min-height: 0;
      background: #ffffff;
    }

    #chart {
      width: 100%;
      height: 100%;
    }

    .legend {
      position: absolute;
      top: 9px;
      left: 12px;
      right: 70px;
      z-index: 5;
      display: flex;
      flex-wrap: wrap;
      gap: 6px 10px;
      pointer-events: none;
      font-size: 11px;
    }

    .legend-item {
      display: flex;
      flex-direction: column;
      gap: 2px;
      min-width: 86px;
      padding: 3px 5px;
      border-radius: 4px;
      background: rgba(255, 255, 255, 0.90);
      color: #334155;
    }

    .legend-title {
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }

    .legend-swatch {
      width: 14px;
      height: 3px;
      border-radius: 2px;
      flex: 0 0 auto;
    }

    .legend-price {
      padding-left: 19px;
      font-weight: 700;
    }

    .tooltip {
      position: absolute;
      top: 64px;
      left: 12px;
      z-index: 6;
      display: none;
      max-width: min(340px, calc(100% - 24px));
      padding: 8px 9px;
      border: 1px solid rgba(148, 163, 184, 0.75);
      border-radius: 7px;
      background: rgba(255, 255, 255, 0.96);
      box-shadow: 0 4px 16px rgba(15, 23, 42, 0.12);
      color: #1e293b;
      font-size: 11px;
      line-height: 1.4;
      pointer-events: none;
    }

    .tooltip-date {
      margin-bottom: 4px;
      color: #475569;
      font-weight: 700;
    }

    .tooltip-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .tooltip-name {
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }

    .tooltip-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex: 0 0 auto;
    }

    .attribution {
      position: absolute;
      right: 8px;
      bottom: 5px;
      z-index: 5;
      color: #64748b;
      font-size: 10px;
    }

    .attribution a {
      color: #2962ff;
      text-decoration: none;
    }

    .empty-state {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      padding: 24px;
      color: var(--muted);
      text-align: center;
      font-size: 15px;
    }

    dialog {
      width: min(480px, calc(100vw - 28px));
      border: 1px solid #cbd5e1;
      border-radius: 10px;
      padding: 0;
      color: var(--text);
      font: inherit;
      box-shadow: 0 18px 55px rgba(15, 23, 42, 0.23);
    }

    dialog::backdrop {
      background: rgba(15, 23, 42, 0.34);
    }

    .dialog-body {
      padding: 18px;
    }

    .dialog-title {
      margin: 0 0 6px;
      font-size: 17px;
    }

    .dialog-subtitle {
      margin: 0 0 14px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.4;
    }

    .basis-options {
      display: grid;
      gap: 8px;
    }

    .basis-option {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 8px;
      border: 1px solid #e2e8f0;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
    }

    .basis-option:hover { background: #f8fafc; }

    .custom-date-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 8px;
      padding: 8px;
      border: 1px solid #e2e8f0;
      border-radius: 6px;
      font-size: 13px;
    }

    input[type="date"] {
      min-height: 31px;
      padding: 4px 6px;
      border: 1px solid #c7d0dd;
      border-radius: 5px;
      font: inherit;
      font-size: 13px;
    }

    .dialog-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 16px;
    }

    @media (max-width: 700px) {
      .controls { max-height: 500px; }
      .groups { grid-template-columns: 1fr; }
      .legend { right: 8px; }
    }
  </style>
</head>

<body>
  <main class="app">
    <section class="controls">
      <div class="toolbar">
        <button id="default-selection" type="button">Standard-Auswahl</button>
        <button id="select-all" type="button">Alle auswählen</button>
        <button id="clear-all" type="button">Alle abwählen</button>

        <div class="period-box" aria-label="Angezeigter Zeitraum">
          <span class="period-title">Anzeige:</span>
          <button class="period-button" data-range="1y" type="button">1J</button>
          <button class="period-button" data-range="3y" type="button">3J</button>
          <button class="period-button" data-range="5y" type="button">5J</button>
          <button class="period-button" data-range="10y" type="button">10J</button>
          <button class="period-button" data-range="20y" type="button">20J</button>
          <button class="period-button active" data-range="all" type="button">Alles</button>
        </div>

        <div class="mode-box" aria-label="Darstellungsart">
          <span class="mode-title">Darstellung:</span>

          <label class="control-label">
            <input type="radio" name="view-mode" value="price">
            Preis
          </label>

          <label class="control-label">
            <input type="radio" name="view-mode" value="indexed" checked>
            Index 100
          </label>

          <label class="control-label">
            <input type="radio" name="view-mode" value="log-return">
            Log-Performance
          </label>
        </div>

        <button id="basis-button" class="basis-button" type="button">
          Indexbasis: Anzeige-Start
        </button>
      </div>

      <div id="commodity-groups" class="groups"></div>
      <div id="status" class="status">Datenquelle wird geladen.</div>
    </section>

    <section class="chart-shell">
      <div id="chart"></div>
      <div id="legend" class="legend"></div>
      <div id="tooltip" class="tooltip"></div>

      <div class="attribution">
        Charts by
        <a href="https://www.tradingview.com/" target="_blank" rel="noopener nofollow">
          TradingView
        </a>
        · Lightweight Charts™
      </div>
    </section>
  </main>

  <dialog id="basis-dialog">
    <form method="dialog" class="dialog-body">
      <h2 class="dialog-title">Indexbasis festlegen</h2>
      <p class="dialog-subtitle">
        Diese Wahl beeinflusst nur <b>Index 100</b> und <b>Log-Performance</b>.
        Der Anzeigezeitraum oben bleibt davon getrennt.
      </p>

      <div class="basis-options">
        <label class="basis-option">
          <input type="radio" name="basis-choice" value="display-start">
          Beginn des Anzeigezeitraums
        </label>

        <label class="basis-option">
          <input type="radio" name="basis-choice" value="1y">
          1 Jahr vor dem letzten verfügbaren Kurs
        </label>

        <label class="basis-option">
          <input type="radio" name="basis-choice" value="3y">
          3 Jahre vor dem letzten verfügbaren Kurs
        </label>

        <label class="basis-option">
          <input type="radio" name="basis-choice" value="5y">
          5 Jahre vor dem letzten verfügbaren Kurs
        </label>

        <label class="basis-option">
          <input type="radio" name="basis-choice" value="10y">
          10 Jahre vor dem letzten verfügbaren Kurs
        </label>

        <label class="basis-option">
          <input type="radio" name="basis-choice" value="20y">
          20 Jahre vor dem letzten verfügbaren Kurs
        </label>

        <label class="basis-option">
          <input type="radio" name="basis-choice" value="first-common">
          Erste gemeinsame Beobachtung aller ausgewählten Reihen
        </label>
      </div>

      <label class="custom-date-row">
        <input type="radio" name="basis-choice" value="custom">
        Eigenes Datum:
        <input id="custom-basis-date" type="date">
      </label>

      <div class="dialog-actions">
        <button id="basis-cancel" type="button">Abbrechen</button>
        <button id="basis-apply" class="primary" type="button">Übernehmen</button>
      </div>
    </form>
  </dialog>

  <script>
    /*
      Data source:
      The page reads daily prices from data/commodities.json.
      GitHub Actions writes this file from Yahoo Finance.
      No request is sent from the browser directly to Yahoo Finance.
    */

    const COMMODITY_GROUPS = {
      "Energy": [
        { ticker: "CL=F", name: "WTI Crude" },
        { ticker: "BZ=F", name: "Brent Crude" },
        { ticker: "NG=F", name: "Natural Gas" },
        { ticker: "RB=F", name: "RBOB Gasoline" },
        { ticker: "HO=F", name: "Heating Oil" }
      ],
      "Metals": [
        { ticker: "GC=F", name: "Gold" },
        { ticker: "SI=F", name: "Silver" },
        { ticker: "HG=F", name: "Copper" },
        { ticker: "PL=F", name: "Platinum" },
        { ticker: "PA=F", name: "Palladium" },
        { ticker: "ALI=F", name: "Aluminum" }
      ],
      "Grains / Oilseeds": [
        { ticker: "ZC=F", name: "Corn" },
        { ticker: "ZW=F", name: "Wheat" },
        { ticker: "KE=F", name: "KC HRW Wheat" },
        { ticker: "ZS=F", name: "Soybeans" },
        { ticker: "ZL=F", name: "Soybean Oil" },
        { ticker: "ZM=F", name: "Soybean Meal" },
        { ticker: "ZO=F", name: "Oats" },
        { ticker: "ZR=F", name: "Rough Rice" }
      ],
      "Softs": [
        { ticker: "KC=F", name: "Coffee" },
        { ticker: "SB=F", name: "Sugar" },
        { ticker: "CC=F", name: "Cocoa" },
        { ticker: "CT=F", name: "Cotton" },
        { ticker: "OJ=F", name: "Orange Juice" }
      ],
      "Livestock": [
        { ticker: "LE=F", name: "Live Cattle" },
        { ticker: "HE=F", name: "Lean Hogs" },
        { ticker: "GF=F", name: "Feeder Cattle" }
      ]
    };

    const DEFAULT_TICKERS = ["CL=F", "BZ=F", "NG=F", "GC=F", "HG=F", "ZC=F"];

    const COLOR_BY_TICKER = {
      "CL=F": "#003f5c", "BZ=F": "#ef5675", "NG=F": "#2f4b7c",
      "RB=F": "#ffa600", "HO=F": "#7a5195",

      "GC=F": "#c99700", "SI=F": "#6b7280", "HG=F": "#d04a02",
      "PL=F": "#5d9cec", "PA=F": "#a42cd6", "ALI=F": "#00a6a6",

      "ZC=F": "#6a994e", "ZW=F": "#bc6c25", "KE=F": "#99582a",
      "ZS=F": "#40916c", "ZL=F": "#e9c46a", "ZM=F": "#386641",
      "ZO=F": "#90be6d", "ZR=F": "#577590",

      "KC=F": "#6f4e37", "SB=F": "#e76f51", "CC=F": "#5f0f40",
      "CT=F": "#4d908e", "OJ=F": "#f77f00",

      "LE=F": "#9b2226", "HE=F": "#bb3e03", "GF=F": "#495057"
    };

    const ALL_COMMODITIES = Object.values(COMMODITY_GROUPS).flat();
    const AUTO_REFRESH_MS = 60 * 1000;

    let dataset = null;
    let chart = null;
    let seriesEntries = [];
    let resizeObserver = null;
    let fetchInProgress = false;
    let renderTimer = null;

    /*
      State 1: Which dates are displayed on the x-axis.
      State 2: Which date is used as base for Index 100 / Log-Performance.
      These are intentionally separate.
    */
    let displayRangeKey = "all";
    let indexBasisKey = "display-start";
    let customBasisDate = "";

    function getColor(ticker) {
      return COLOR_BY_TICKER[ticker] || "#1d4ed8";
    }

    function setStatus(text) {
      document.getElementById("status").textContent = text;
    }

    function getViewMode() {
      const selected = document.querySelector('input[name="view-mode"]:checked');
      return selected ? selected.value : "indexed";
    }

    function getViewModeLabel(mode) {
      if (mode === "price") return "Preis";
      if (mode === "log-return") return "Log-Performance";
      return "Index 100";
    }

    function getDisplayRangeLabel() {
      const labels = {
        "1y": "letztes Jahr",
        "3y": "letzte 3 Jahre",
        "5y": "letzte 5 Jahre",
        "10y": "letzte 10 Jahre",
        "20y": "letzte 20 Jahre",
        "all": "gesamte Historie"
      };

      return labels[displayRangeKey] || "gesamte Historie";
    }

    function getBasisLabel() {
      const labels = {
        "display-start": "Anzeige-Start",
        "1y": "1 Jahr zurück",
        "3y": "3 Jahre zurück",
        "5y": "5 Jahre zurück",
        "10y": "10 Jahre zurück",
        "20y": "20 Jahre zurück",
        "first-common": "erste gemeinsame Beobachtung",
        "custom": customBasisDate ? customBasisDate : "eigenes Datum"
      };

      return labels[indexBasisKey] || "Anzeige-Start";
    }

    function formatTimestamp(timestamp) {
      if (!timestamp) return "unbekannt";

      const date = new Date(timestamp);
      if (Number.isNaN(date.valueOf())) return timestamp;

      return new Intl.DateTimeFormat("de-DE", {
        dateStyle: "medium",
        timeStyle: "short"
      }).format(date);
    }

    function formatDate(time) {
      if (typeof time === "string") {
        return new Intl.DateTimeFormat("de-DE", { dateStyle: "medium" })
          .format(new Date(`${time}T12:00:00Z`));
      }

      if (time && typeof time === "object" && "year" in time) {
        return `${String(time.day).padStart(2, "0")}.${String(time.month).padStart(2, "0")}.${time.year}`;
      }

      return "";
    }

    function formatValue(value, viewMode) {
      if (!Number.isFinite(value)) return "–";

      if (viewMode === "indexed") {
        return value.toLocaleString("de-DE", {
          minimumFractionDigits: 2,
          maximumFractionDigits: 2
        });
      }

      if (viewMode === "log-return") {
        return value.toLocaleString("de-DE", {
          minimumFractionDigits: 2,
          maximumFractionDigits: 2
        });
      }

      return value.toLocaleString("de-DE", {
        maximumSignificantDigits: 7
      });
    }

    function formatActualPrice(value) {
      if (!Number.isFinite(value)) return "–";

      return value.toLocaleString("de-DE", {
        maximumSignificantDigits: 7
      });
    }

    function subtractYears(dateString, years) {
      const [year, month, day] = dateString.split("-").map(Number);
      const date = new Date(Date.UTC(year - years, month - 1, day));
      return date.toISOString().slice(0, 10);
    }

    function updatePeriodButtons() {
      document.querySelectorAll(".period-button").forEach((button) => {
        button.classList.toggle(
          "active",
          button.dataset.range === displayRangeKey
        );
      });
    }

    function updateBasisButton() {
      const button = document.getElementById("basis-button");
      const isPriceMode = getViewMode() === "price";

      button.disabled = isPriceMode;
      button.textContent = isPriceMode
        ? "Indexbasis: nur bei Index / Log"
        : `Indexbasis: ${getBasisLabel()}`;
    }

    function getSelectedSeries() {
      if (!dataset?.series) return [];

      const selectedTickers = new Set(
        Array.from(document.querySelectorAll(".commodity-checkbox:checked"))
          .map((checkbox) => checkbox.value)
      );

      return dataset.series.filter((series) => selectedTickers.has(series.ticker));
    }

    function getSeriesPoints(series) {
      return (series.data || [])
        .map(([time, value]) => ({
          time,
          value: Number(value)
        }))
        .filter((point) => Number.isFinite(point.value) && point.value > 0)
        .sort((a, b) => a.time.localeCompare(b.time));
    }

    function getLatestDate(selectedSeries) {
      const dates = selectedSeries
        .map((series) => {
          const points = getSeriesPoints(series);
          return points.length ? points[points.length - 1].time : null;
        })
        .filter(Boolean)
        .sort();

      return dates.length ? dates[dates.length - 1] : null;
    }

    function getDisplayStartDate(latestDate) {
      if (!latestDate || displayRangeKey === "all") return null;

      return subtractYears(
        latestDate,
        Number.parseInt(displayRangeKey, 10)
      );
    }

    function getFirstCommonDate(selectedSeries) {
      const firstDates = selectedSeries
        .map((series) => {
          const points = getSeriesPoints(series);
          return points.length ? points[0].time : null;
        })
        .filter(Boolean)
        .sort();

      /*
        The latest first date is the first point at which all selected
        series can potentially be observed.
      */
      return firstDates.length ? firstDates[firstDates.length - 1] : null;
    }

    function getBasisTargetDate(selectedSeries, latestDate, displayStartDate) {
      if (indexBasisKey === "display-start") {
        return displayStartDate || getFirstCommonDate(selectedSeries);
      }

      if (indexBasisKey === "first-common") {
        return getFirstCommonDate(selectedSeries);
      }

      if (indexBasisKey === "custom") {
        return customBasisDate || displayStartDate || getFirstCommonDate(selectedSeries);
      }

      const years = Number.parseInt(indexBasisKey, 10);
      if (Number.isFinite(years) && latestDate) {
        return subtractYears(latestDate, years);
      }

      return displayStartDate || getFirstCommonDate(selectedSeries);
    }

    function findBasePoint(points, targetDate) {
      if (!points.length) return null;

      if (!targetDate) return points[0];

      return points.find((point) => point.time >= targetDate) || points[0];
    }

    function transformSeriesData(series, viewMode, basisDate) {
      /*
        Every data point stays in the chart. The selected display period is
        applied later to the time scale as a logical viewport, not by removing
        observations. Therefore the user can still drag left afterwards.
      */
      const allPoints = getSeriesPoints(series);
      if (!allPoints.length) return [];

      const basePoint = findBasePoint(allPoints, basisDate);
      if (!basePoint) return [];

      if (viewMode === "price") {
        return allPoints;
      }

      if (viewMode === "indexed") {
        return allPoints.map((point) => ({
          time: point.time,
          value: (point.value / basePoint.value) * 100
        }));
      }

      /*
        Log-performance (not a logarithmic original-price axis):
        100 × ln(P_t / P_base)
      */
      return allPoints.map((point) => ({
        time: point.time,
        value: 100 * Math.log(point.value / basePoint.value)
      }));
    }

    function getTimeline(selectedSeries) {
      return [...new Set(
        selectedSeries.flatMap((series) =>
          getSeriesPoints(series).map((point) => point.time)
        )
      )].sort();
    }

    function getLogicalDisplayRange(timeline, displayStartDate) {
      if (!timeline.length || !displayStartDate) {
        return null;
      }

      const firstVisibleIndex = timeline.findIndex(
        (time) => time >= displayStartDate
      );

      if (firstVisibleIndex === -1) {
        return null;
      }

      /*
        Logical indices belong to the combined time scale, not to one
        individual commodity series. A small margin preserves readability.
      */
      return {
        from: Math.max(-0.5, firstVisibleIndex - 0.5),
        to: timeline.length - 1 + 2
      };
    }

    function applyDisplayViewport(logicalRange) {
      if (!chart) return;

      const apply = () => {
        if (!chart) return;

        if (logicalRange) {
          chart.timeScale().setVisibleLogicalRange(logicalRange);
        } else {
          chart.timeScale().fitContent();
        }
      };

      /*
        A GitHub Pages / Notion iframe can receive its final dimensions only
        after the first paint. Applying twice after layout prevents fitContent
        or resizing from overriding the selected view.
      */
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          apply();
          window.setTimeout(apply, 120);
        });
      });
    }

    function getLatestActualPrice(series) {
      const points = getSeriesPoints(series);
      return points.length ? points[points.length - 1].value : NaN;
    }

    function buildControls() {
      const root = document.getElementById("commodity-groups");
      root.innerHTML = "";

      Object.entries(COMMODITY_GROUPS).forEach(([groupName, commodities], index) => {
        const details = document.createElement("details");
        details.open = index < 2;

        const summary = document.createElement("summary");
        summary.textContent = groupName;

        const actions = document.createElement("div");
        actions.className = "group-actions";

        const onlyButton = document.createElement("button");
        onlyButton.type = "button";
        onlyButton.textContent = "Nur diese Gruppe";
        onlyButton.addEventListener("click", (event) => {
          event.preventDefault();
          event.stopPropagation();
          setCheckedTickers(commodities.map((item) => item.ticker));
          requestRender();
        });

        const addButton = document.createElement("button");
        addButton.type = "button";
        addButton.textContent = "Gruppe ergänzen";
        addButton.addEventListener("click", (event) => {
          event.preventDefault();
          event.stopPropagation();

          const tickers = new Set(commodities.map((item) => item.ticker));
          document.querySelectorAll(".commodity-checkbox").forEach((checkbox) => {
            if (tickers.has(checkbox.value)) checkbox.checked = true;
          });
          requestRender();
        });

        actions.append(onlyButton, addButton);

        const list = document.createElement("div");
        list.className = "commodity-list";

        commodities.forEach((commodity) => {
          const label = document.createElement("label");
          label.className = "commodity-item";
          label.style.setProperty("--series-color", getColor(commodity.ticker));

          const checkbox = document.createElement("input");
          checkbox.type = "checkbox";
          checkbox.className = "commodity-checkbox";
          checkbox.value = commodity.ticker;
          checkbox.checked = DEFAULT_TICKERS.includes(commodity.ticker);
          checkbox.addEventListener("change", requestRender);

          const name = document.createElement("span");
          name.textContent = commodity.name;

          const ticker = document.createElement("span");
          ticker.className = "ticker";
          ticker.textContent = ` (${commodity.ticker})`;

          name.appendChild(ticker);
          label.append(checkbox, name);
          list.appendChild(label);
        });

        details.append(summary, actions, list);
        root.appendChild(details);
      });
    }

    function setCheckedTickers(tickers) {
      const target = new Set(tickers);

      document.querySelectorAll(".commodity-checkbox").forEach((checkbox) => {
        checkbox.checked = target.has(checkbox.value);
      });
    }

    function resetChart() {
      if (resizeObserver) {
        resizeObserver.disconnect();
        resizeObserver = null;
      }

      if (chart) {
        chart.remove();
        chart = null;
      }

      seriesEntries = [];
      document.getElementById("chart").innerHTML = "";
      document.getElementById("legend").innerHTML = "";
      document.getElementById("tooltip").style.display = "none";
    }

    function createChart() {
      const container = document.getElementById("chart");

      chart = LightweightCharts.createChart(container, {
        width: Math.max(container.clientWidth, 1),
        height: Math.max(container.clientHeight, 1),
        layout: {
          background: { type: "solid", color: "#ffffff" },
          textColor: "#475569",
          fontFamily: "Arial, Helvetica, sans-serif",
          fontSize: 12
        },
        grid: {
          vertLines: { visible: false },
          horzLines: { visible: false }
        },
        leftPriceScale: { visible: false },
        rightPriceScale: {
          visible: true,
          borderColor: "#cbd5e1",
          entireTextOnly: true,
          autoScale: true
        },
        timeScale: {
          borderColor: "#cbd5e1",
          timeVisible: false,
          secondsVisible: false,
        
          rightOffset: 2,
        
          /*
            Wichtig für tägliche Daten über viele Jahre:
            Der Abstand darf sehr klein werden, damit 10–40 Jahre
            auf einmal dargestellt werden können.
          */
          barSpacing: 1.2,
          minBarSpacing: 0.05
        },
        crosshair: {
          vertLine: {
            color: "rgba(30, 41, 59, 0.45)",
            width: 1,
            style: LightweightCharts.LineStyle.Dashed,
            labelBackgroundColor: "#475569"
          },
          horzLine: {
            color: "rgba(30, 41, 59, 0.30)",
            width: 1,
            style: LightweightCharts.LineStyle.Dashed,
            labelBackgroundColor: "#475569"
          }
        },
        handleScroll: true,
        handleScale: true
      });

      resizeObserver = new ResizeObserver(() => {
        if (!chart) return;

        chart.applyOptions({
          width: Math.max(container.clientWidth, 1),
          height: Math.max(container.clientHeight, 1)
        });
      });

      resizeObserver.observe(container);
      chart.subscribeCrosshairMove(updateTooltip);
    }

    function addLegendEntry(entry) {
      const legend = document.getElementById("legend");

      const item = document.createElement("span");
      item.className = "legend-item";

      const title = document.createElement("span");
      title.className = "legend-title";

      const swatch = document.createElement("span");
      swatch.className = "legend-swatch";
      swatch.style.background = entry.color;

      const name = document.createElement("span");
      name.textContent = entry.name;

      title.append(swatch, name);

      const price = document.createElement("span");
      price.className = "legend-price";
      price.style.color = entry.color;
      price.textContent = `Aktuell: ${formatActualPrice(entry.latestActualPrice)}`;

      item.append(title, price);
      legend.appendChild(item);
    }

    function updateTooltip(param) {
      const tooltip = document.getElementById("tooltip");

      if (!param?.time || !param?.point || param.point.x < 0 || param.point.y < 0) {
        tooltip.style.display = "none";
        return;
      }

      const viewMode = getViewMode();
      const rows = [];

      seriesEntries.forEach((entry) => {
        const point = param.seriesData.get(entry.api);
        if (!point || !Number.isFinite(point.value)) return;

        rows.push(`
          <div class="tooltip-row">
            <span class="tooltip-name">
              <span class="tooltip-dot" style="background:${entry.color}"></span>
              ${entry.name}
            </span>
            <strong>${formatValue(point.value, viewMode)}</strong>
          </div>
        `);
      });

      if (!rows.length) {
        tooltip.style.display = "none";
        return;
      }

      tooltip.innerHTML = `
        <div class="tooltip-date">${formatDate(param.time)}</div>
        ${rows.join("")}
      `;

      tooltip.style.display = "block";
    }

    function renderChart() {
      if (!dataset) return;

      if (!window.LightweightCharts) {
        setStatus("Die Chart-Bibliothek konnte nicht geladen werden. Bitte die Seite neu laden.");
        return;
      }

      const selected = getSelectedSeries();
      const viewMode = getViewMode();
      const chartElement = document.getElementById("chart");

      updateBasisButton();

      if (!selected.length) {
        resetChart();
        chartElement.innerHTML = `
          <div class="empty-state">
            Bitte mindestens einen Rohstoff auswählen.
          </div>
        `;
        setStatus("Keine Zeitreihe ausgewählt.");
        return;
      }

      const timeline = getTimeline(selected);
      const latestDate = timeline.length ? timeline[timeline.length - 1] : null;
      const displayStartDate = getDisplayStartDate(latestDate);
      const logicalRange = getLogicalDisplayRange(timeline, displayStartDate);

      const basisDate = getBasisTargetDate(
        selected,
        latestDate,
        displayStartDate
      );

      resetChart();
      createChart();

      selected.forEach((series) => {
        const data = transformSeriesData(
          series,
          viewMode,
          basisDate
        );

        if (!data.length) return;

        const color = getColor(series.ticker);

        const api = chart.addSeries(LightweightCharts.LineSeries, {
          color,
          lineWidth: 2,
          lineType: LightweightCharts.LineType.Simple,
          crosshairMarkerVisible: true,
          crosshairMarkerRadius: 4,
          crosshairMarkerBorderColor: color,
          crosshairMarkerBackgroundColor: "#ffffff",
          lastValueVisible: false,
          priceLineVisible: false,
          title: series.name,
          priceFormat: {
            type: "price",
            precision: viewMode === "price" ? 4 : 2,
            minMove: viewMode === "price" ? 0.0001 : 0.01
          }
        });

        api.setData(data);

        const entry = {
          api,
          name: series.name,
          color,
          latestActualPrice: getLatestActualPrice(series)
        };

        seriesEntries.push(entry);
        addLegendEntry(entry);
      });

      if (!seriesEntries.length) {
        resetChart();
        chartElement.innerHTML = `
          <div class="empty-state">
            Für die aktuelle Auswahl liegen keine Daten vor.
          </div>
        `;
        setStatus("Für diese Auswahl liegen keine darstellbaren Daten vor.");
        return;
      }

      /*
        All history stays loaded. The buttons change only the visible logical
        range of the time scale; "Alles" calls fitContent.
      */
      applyDisplayViewport(logicalRange);

      const displayedRange = displayStartDate
        ? `${displayStartDate} bis ${latestDate}`
        : `erste verfügbare Beobachtung bis ${latestDate}`;

      const basisText = viewMode === "price"
        ? "keine Indexbasis"
        : `${getBasisLabel()} (${basisDate || "erste verfügbare Beobachtung"})`;

      setStatus(
        `${seriesEntries.length} Reihen · ${getViewModeLabel(viewMode)} · ` +
        `Anzeige: ${displayedRange} · ` +
        `X-Achse: ${logicalRange ? "Zeitfenster gesetzt" : "gesamte Historie"} · ` +
        `Indexbasis: ${basisText} · ` +
        `tägliche Schlusskurse · Datenstand: ${formatTimestamp(dataset.generated_at)}.`
      );
    }

    function requestRender() {
      clearTimeout(renderTimer);
      renderTimer = window.setTimeout(renderChart, 80);
    }

    async function loadData({ silent = false } = {}) {
      if (fetchInProgress) return;
      fetchInProgress = true;

      try {
        const response = await fetch(
          `data/commodities.json?cache=${Date.now()}`,
          { cache: "no-store" }
        );

        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        const nextDataset = await response.json();

        if (!Array.isArray(nextDataset.series) || !nextDataset.series.length) {
          throw new Error("Die Datendatei enthält noch keine Zeitreihen.");
        }

        const oldSignature = dataset
          ? `${dataset.generated_at}|${dataset.series.length}`
          : "";

        const newSignature =
          `${nextDataset.generated_at}|${nextDataset.series.length}`;

        dataset = nextDataset;

        if (!silent || oldSignature !== newSignature) {
          renderChart();
        }
      } catch (error) {
        if (!dataset) {
          resetChart();
          document.getElementById("chart").innerHTML = `
            <div class="empty-state">
              Noch keine Daten verfügbar. Starte einmal den GitHub-Workflow
              <b>Update data and deploy dashboard</b> im Tab <b>Actions</b>.
            </div>
          `;
        }

        setStatus(`Daten konnten nicht geladen werden: ${error.message}`);
      } finally {
        fetchInProgress = false;
      }
    }

    function syncDialogWithCurrentChoice() {
      const selected = document.querySelector(
        `input[name="basis-choice"][value="${indexBasisKey}"]`
      );

      if (selected) selected.checked = true;

      document.getElementById("custom-basis-date").value = customBasisDate;
    }

    function openBasisDialog() {
      if (getViewMode() === "price") return;

      syncDialogWithCurrentChoice();
      document.getElementById("basis-dialog").showModal();
    }

    function applyBasisDialog() {
      const selected = document.querySelector(
        'input[name="basis-choice"]:checked'
      );

      if (!selected) return;

      const nextKey = selected.value;
      const nextCustomDate = document.getElementById("custom-basis-date").value;

      if (nextKey === "custom" && !nextCustomDate) {
        setStatus("Bitte für „Eigenes Datum“ ein Datum auswählen.");
        return;
      }

      indexBasisKey = nextKey;
      customBasisDate = nextCustomDate;
      document.getElementById("basis-dialog").close();
      requestRender();
    }

    document.querySelectorAll(".period-button").forEach((button) => {
      button.addEventListener("click", () => {
        displayRangeKey = button.dataset.range;
        updatePeriodButtons();
        requestRender();
      });
    });

    document.getElementById("default-selection").addEventListener("click", () => {
      setCheckedTickers(DEFAULT_TICKERS);
      requestRender();
    });

    document.getElementById("select-all").addEventListener("click", () => {
      setCheckedTickers(ALL_COMMODITIES.map((item) => item.ticker));
      requestRender();
    });

    document.getElementById("clear-all").addEventListener("click", () => {
      setCheckedTickers([]);
      requestRender();
    });

    document.querySelectorAll('input[name="view-mode"]').forEach((input) => {
      input.addEventListener("change", () => {
        updateBasisButton();
        requestRender();
      });
    });

    document.getElementById("basis-button").addEventListener("click", openBasisDialog);

    document.getElementById("basis-cancel").addEventListener("click", () => {
      document.getElementById("basis-dialog").close();
    });

    document.getElementById("basis-apply").addEventListener("click", applyBasisDialog);

    buildControls();
    updatePeriodButtons();
    updateBasisButton();
    loadData();

    /*
      The browser checks every minute whether GitHub Actions has published a
      newer data/commodities.json file.
    */
    window.setInterval(() => loadData({ silent: true }), AUTO_REFRESH_MS);
  </script>
</body>
</html>
