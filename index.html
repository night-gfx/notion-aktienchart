<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Rohstoff-CFD Vergleich</title>

  <style>
    :root {
      --background: #ffffff;
      --panel: #fafafa;
      --border: #dedede;
      --text: #202020;
      --muted: #666666;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      background: var(--background);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      overflow: hidden;
    }

    .page {
      display: flex;
      flex-direction: column;
      width: 100%;
      height: 100vh;
    }

    .controls {
      flex: 0 0 auto;
      max-height: 310px;
      overflow-y: auto;
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
      background: var(--panel);
    }

    .top-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px 12px;
      margin-bottom: 10px;
    }

    .top-row label {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      cursor: pointer;
    }

    select,
    input[type="text"],
    button {
      min-height: 30px;
      padding: 5px 9px;
      border: 1px solid #cfcfcf;
      border-radius: 6px;
      background: #ffffff;
      color: var(--text);
      font-family: inherit;
      font-size: 13px;
    }

    button {
      cursor: pointer;
    }

    button:hover {
      background: #f0f0f0;
    }

    .custom-symbol-row {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      margin-bottom: 10px;
    }

    .custom-symbol-row input {
      width: min(260px, 100%);
    }

    .groups {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(205px, 1fr));
      gap: 8px;
    }

    details {
      padding: 7px 9px;
      border: 1px solid var(--border);
      border-radius: 7px;
      background: #ffffff;
    }

    summary {
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      user-select: none;
    }

    .commodity-list {
      display: grid;
      gap: 5px;
      margin-top: 8px;
    }

    .commodity-list label {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      cursor: pointer;
    }

    .symbol-code {
      color: var(--muted);
      font-size: 11px;
    }

    .custom-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 10px;
    }

    .custom-item {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 7px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: #ffffff;
      font-size: 12px;
    }

    .custom-item button {
      min-height: auto;
      padding: 0 3px;
      border: none;
      background: transparent;
      color: #777777;
      font-size: 15px;
      line-height: 1;
    }

    .custom-item button:hover {
      color: #000000;
      background: transparent;
    }

    .status {
      margin-top: 10px;
      color: var(--muted);
      font-size: 12px;
    }

    .chart-area {
      flex: 1 1 auto;
      min-height: 0;
      width: 100%;
      background: #ffffff;
    }

    .tradingview-widget-container,
    .tradingview-widget-container__widget {
      width: 100%;
      height: 100%;
    }

    .tradingview-widget-copyright {
      padding: 3px 8px;
      color: #777777;
      font-size: 10px;
      text-align: right;
    }

    .tradingview-widget-copyright a {
      color: #2962ff;
      text-decoration: none;
    }

    .empty-state {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      color: #666666;
      font-size: 15px;
      text-align: center;
      padding: 20px;
    }

    @media (max-width: 700px) {
      .controls {
        max-height: 360px;
      }

      .groups {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <main class="page">

    <section class="controls">
      <div class="top-row">
        <button id="select-all" type="button">Alle CFDs auswählen</button>
        <button id="clear-all" type="button">Alle abwählen</button>
        <button id="default-selection" type="button">Standard-Auswahl</button>
        <button id="update-chart" type="button">Diagramm aktualisieren</button>

        <label>
          Zeitraum:
          <select id="range-select">
            <option value="12M">1 Jahr</option>
            <option value="36M">3 Jahre</option>
            <option value="60M">5 Jahre</option>
            <option value="120M">10 Jahre</option>
            <option value="ALL" selected>Maximal verfügbar</option>
          </select>
        </label>

        <label>
          <input id="log-scale" type="checkbox" checked />
          Logarithmische Skala
        </label>
      </div>

      <div class="custom-symbol-row">
        <input
          id="custom-symbol"
          type="text"
          placeholder="Eigenes TradingView-CFD-Symbol, z. B. CAPITALCOM:COCOA"
          autocomplete="off"
        />
        <button id="add-custom-symbol" type="button">
          Eigenes Symbol hinzufügen
        </button>
      </div>

      <div class="groups" id="commodity-groups"></div>

      <div class="custom-list" id="custom-symbol-list"></div>

      <div class="status" id="status">
        Rohstoff-CFDs werden vorbereitet.
      </div>
    </section>

    <section class="chart-area">
      <div class="tradingview-widget-container">
        <div
          id="tradingview-chart"
          class="tradingview-widget-container__widget"
        ></div>

        <div class="tradingview-widget-copyright">
          <a
            href="https://www.tradingview.com/"
            target="_blank"
            rel="noopener nofollow"
          >
            Charts by TradingView
          </a>
        </div>
      </div>
    </section>

  </main>

  <script>
    /*
      Nur Cash-/Spot- bzw. CFD-Symbole.
      Keine Futures-Symbole wie COMEX:GC1! oder NYMEX:CL1!.

      Einige Rohstoffe aus der ursprünglichen Futures-Liste haben
      keine eindeutig verifizierbare CFD-Entsprechung im kostenlosen
      Widget. Dafür kannst du oben ein eigenes Symbol ergänzen.
    */
    const COMMODITY_GROUPS = {
      "Energy": [
        {
          name: "WTI Crude",
          symbol: "TVC:USOIL"
        },
        {
          name: "Brent Crude",
          symbol: "TVC:UKOIL"
        },
        {
          name: "Natural Gas",
          symbol: "OANDA:NATGASUSD"
        }
      ],

      "Metals": [
        {
          name: "Gold",
          symbol: "TVC:GOLD"
        },
        {
          name: "Silver",
          symbol: "TVC:SILVER"
        },
        {
          name: "Platinum",
          symbol: "TVC:PLATINUM"
        },
        {
          name: "Copper",
          symbol: "CITYINDEX:COPPERCFD"
        }
      ],

      "Grains / Oilseeds": [
        {
          name: "Corn",
          symbol: "OANDA:CORNUSD"
        },
        {
          name: "Wheat",
          symbol: "OANDA:WHEATUSD"
        },
        {
          name: "Soybeans",
          symbol: "OANDA:SOYBNUSD"
        }
      ],

      "Softs": [
        {
          name: "Coffee",
          symbol: "FOREXCOM:COFFEE"
        },
        {
          name: "Sugar",
          symbol: "FOREXCOM:SUGAR"
        },
        {
          name: "Cocoa",
          symbol: "CAPITALCOM:COCOA"
        },
        {
          name: "Cotton",
          symbol: "FOREXCOM:COTTON"
        }
      ]
    };

    /*
      Die Standard-Auswahl ist bewusst kleiner als die Gesamtliste.
      So bleibt der Chart direkt lesbar.
    */
    const DEFAULT_SYMBOLS = [
      "TVC:USOIL",
      "TVC:UKOIL",
      "OANDA:NATGASUSD",
      "TVC:GOLD",
      "TVC:SILVER",
      "CITYINDEX:COPPERCFD",
      "OANDA:CORNUSD",
      "FOREXCOM:COFFEE"
    ];

    let customSymbols = [];

    function setStatus(message) {
      document.getElementById("status").textContent = message;
    }

    function normaliseSymbol(symbol) {
      return symbol.trim().toUpperCase();
    }

    function isValidTradingViewSymbol(symbol) {
      /*
        Beispiele:
        TVC:GOLD
        OANDA:CORNUSD
        FOREXCOM:COFFEE
        CAPITALCOM:COCOA
      */
      return /^[A-Z0-9_]+:[A-Z0-9!._-]+$/.test(symbol);
    }

    function buildCommodityGroups() {
      const groupsContainer = document.getElementById("commodity-groups");

      groupsContainer.innerHTML = "";

      Object.entries(COMMODITY_GROUPS).forEach(
        ([groupName, commodities], groupIndex) => {
          const details = document.createElement("details");

          if (groupIndex < 2) {
            details.open = true;
          }

          const summary = document.createElement("summary");
          summary.textContent = groupName;

          const list = document.createElement("div");
          list.className = "commodity-list";

          commodities.forEach((commodity) => {
            const label = document.createElement("label");

            const checkbox = document.createElement("input");
            checkbox.type = "checkbox";
            checkbox.className = "commodity-checkbox";
            checkbox.value = commodity.symbol;
            checkbox.dataset.name = commodity.name;

            checkbox.checked = DEFAULT_SYMBOLS.includes(
              commodity.symbol
            );

            const text = document.createElement("span");
            text.innerHTML = `
              ${commodity.name}
              <span class="symbol-code">(${commodity.symbol})</span>
            `;

            label.appendChild(checkbox);
            label.appendChild(text);
            list.appendChild(label);
          });

          details.appendChild(summary);
          details.appendChild(list);
          groupsContainer.appendChild(details);
        }
      );
    }

    function getBaseSelections() {
      return Array.from(
        document.querySelectorAll(".commodity-checkbox:checked")
      ).map((checkbox) => ({
        name: checkbox.dataset.name,
        symbol: checkbox.value
      }));
    }

    function getSelectedAssets() {
      const baseSelections = getBaseSelections();

      const customSelections = customSymbols.map((item) => ({
        name: item.name,
        symbol: item.symbol
      }));

      const seenSymbols = new Set();

      return [...baseSelections, ...customSelections].filter((item) => {
        if (seenSymbols.has(item.symbol)) {
          return false;
        }

        seenSymbols.add(item.symbol);
        return true;
      });
    }

    function setSelectedSymbols(symbols) {
      const symbolsSet = new Set(symbols);

      document.querySelectorAll(".commodity-checkbox").forEach(
        (checkbox) => {
          checkbox.checked = symbolsSet.has(checkbox.value);
        }
      );
    }

    function renderCustomSymbols() {
      const container = document.getElementById("custom-symbol-list");

      container.innerHTML = "";

      customSymbols.forEach((item, index) => {
        const wrapper = document.createElement("div");
        wrapper.className = "custom-item";

        const text = document.createElement("span");
        text.textContent = `${item.name} (${item.symbol})`;

        const removeButton = document.createElement("button");
        removeButton.type = "button";
        removeButton.title = "Entfernen";
        removeButton.textContent = "×";

        removeButton.addEventListener("click", () => {
          customSymbols.splice(index, 1);
          renderCustomSymbols();
          renderTradingViewChart();
        });

        wrapper.appendChild(text);
        wrapper.appendChild(removeButton);
        container.appendChild(wrapper);
      });
    }

    function addCustomSymbol() {
      const input = document.getElementById("custom-symbol");
      const symbol = normaliseSymbol(input.value);

      if (!symbol) {
        return;
      }

      if (!isValidTradingViewSymbol(symbol)) {
        setStatus(
          "Ungültiges Format. Bitte z. B. TVC:GOLD oder CAPITALCOM:COCOA verwenden."
        );
        return;
      }

      const alreadySelected = getSelectedAssets().some(
        (asset) => asset.symbol === symbol
      );

      if (alreadySelected) {
        setStatus(`${symbol} ist bereits ausgewählt.`);
        input.value = "";
        return;
      }

      customSymbols.push({
        name: symbol,
        symbol: symbol
      });

      input.value = "";
      renderCustomSymbols();
      renderTradingViewChart();
    }

    function writeStateToUrl(selectedAssets, range, logScale) {
      const params = new URLSearchParams();

      params.set(
        "symbols",
        selectedAssets.map((asset) => asset.symbol).join(",")
      );

      params.set("range", range);
      params.set("log", logScale ? "1" : "0");

      const newUrl =
        window.location.pathname + "?" + params.toString();

      window.history.replaceState({}, "", newUrl);
    }

    function loadStateFromUrl() {
      const params = new URLSearchParams(window.location.search);

      const symbolsParam = params.get("symbols");
      const rangeParam = params.get("range");
      const logParam = params.get("log");

      if (rangeParam) {
        const rangeSelect = document.getElementById("range-select");

        const isAllowedRange = Array.from(
          rangeSelect.options
        ).some((option) => option.value === rangeParam);

        if (isAllowedRange) {
          rangeSelect.value = rangeParam;
        }
      }

      if (logParam === "0") {
        document.getElementById("log-scale").checked = false;
      }

      if (!symbolsParam) {
        return;
      }

      const requestedSymbols = symbolsParam
        .split(",")
        .map((symbol) => normaliseSymbol(symbol))
        .filter(Boolean);

      const knownSymbols = new Set();

      document.querySelectorAll(".commodity-checkbox").forEach(
        (checkbox) => {
          knownSymbols.add(checkbox.value);
          checkbox.checked = requestedSymbols.includes(
            checkbox.value
          );
        }
      );

      requestedSymbols.forEach((symbol) => {
        if (!knownSymbols.has(symbol) && isValidTradingViewSymbol(symbol)) {
          customSymbols.push({
            name: symbol,
            symbol: symbol
          });
        }
      });

      renderCustomSymbols();
    }

    function renderEmptyState(message) {
      const chartContainer = document.getElementById(
        "tradingview-chart"
      );

      chartContainer.innerHTML = `
        <div class="empty-state">
          ${message}
        </div>
      `;
    }

    function renderTradingViewChart() {
      const assets = getSelectedAssets();

      const range = document.getElementById("range-select").value;
      const logScale = document.getElementById("log-scale").checked;

      if (assets.length === 0) {
        renderEmptyState(
          "Bitte mindestens einen Rohstoff-CFD auswählen."
        );

        setStatus("Keine Zeitreihe ausgewählt.");
        return;
      }

      /*
        Der erste Rohstoff ist die Hauptserie.
        Alle weiteren Serien werden im selben Chart verglichen.
      */
      const mainAsset = assets[0];

      const compareSymbols = assets.slice(1).map((asset) => ({
        symbol: asset.symbol,
        position: "SameScale"
      }));

      const chartContainer = document.getElementById(
        "tradingview-chart"
      );

      chartContainer.innerHTML = "";

      const script = document.createElement("script");

      script.type = "text/javascript";

      script.src =
        "https://s3.tradingview.com/external-embedding/embed-widget-advanced-chart.js";

      script.async = true;

      script.textContent = JSON.stringify({
        autosize: true,

        symbol: mainAsset.symbol,
        interval: "D",
        range: range,

        timezone: "Europe/Berlin",
        theme: "light",
        locale: "de_DE",

        /*
          2 = Linienchart
        */
        style: "2",

        /*
          Möglichst reduzierter Chart.
        */
        hide_top_toolbar: true,
        hide_side_toolbar: true,
        hide_volume: true,
        hide_legend: false,
        withdateranges: false,

        allow_symbol_change: true,
        save_image: false,
        calendar: false,
        details: false,
        hotlist: false,
        watchlist: [],
        studies: [],

        /*
          Alle ausgewählten CFDs in einem Diagramm.
        */
        compareSymbols: compareSymbols,

        /*
          Logarithmische Preisachse.
        */
        overrides: {
          "mainSeriesProperties.priceAxisProperties.log": logScale
        },

        backgroundColor: "#ffffff",
        gridColor: "rgba(46, 46, 46, 0.06)",

        support_host: "https://www.tradingview.com"
      });

      chartContainer.appendChild(script);

      writeStateToUrl(assets, range, logScale);

      const selectedNames = assets
        .map((asset) => asset.name)
        .join(", ");

      setStatus(
        `${assets.length} Reihen im Diagramm: ${selectedNames}`
      );
    }

    document
      .getElementById("select-all")
      .addEventListener("click", () => {
        const allSymbols = Object.values(COMMODITY_GROUPS)
          .flat()
          .map((commodity) => commodity.symbol);

        setSelectedSymbols(allSymbols);
        renderTradingViewChart();
      });

    document
      .getElementById("clear-all")
      .addEventListener("click", () => {
        setSelectedSymbols([]);
        customSymbols = [];
        renderCustomSymbols();
        renderTradingViewChart();
      });

    document
      .getElementById("default-selection")
      .addEventListener("click", () => {
        setSelectedSymbols(DEFAULT_SYMBOLS);
        customSymbols = [];
        renderCustomSymbols();
        renderTradingViewChart();
      });

    document
      .getElementById("update-chart")
      .addEventListener("click", renderTradingViewChart);

    document
      .getElementById("range-select")
      .addEventListener("change", renderTradingViewChart);

    document
      .getElementById("log-scale")
      .addEventListener("change", renderTradingViewChart);

    document
      .getElementById("add-custom-symbol")
      .addEventListener("click", addCustomSymbol);

    document
      .getElementById("custom-symbol")
      .addEventListener("keydown", (event) => {
        if (event.key === "Enter") {
          addCustomSymbol();
        }
      });

    buildCommodityGroups();
    loadStateFromUrl();
    renderTradingViewChart();
  </script>
</body>
</html>
