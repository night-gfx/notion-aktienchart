<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rohstoffvergleich</title>

  <!-- Pinned Lightweight Charts™ version so later library changes do not break the page. -->
  <script src="https://cdn.jsdelivr.net/npm/lightweight-charts@5.2.0/dist/lightweight-charts.standalone.production.js"></script>

  <style>
    :root {
      --bg: #ffffff;
      --panel: #f8fafc;
      --border: #d8dee8;
      --text: #172033;
      --muted: #64748b;
      --primary: #1d4ed8;
      --primary-hover: #1e40af;
    }

    * { box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
    }

    body { overflow: hidden; }

    .app {
      display: flex;
      flex-direction: column;
      width: 100%;
      height: 100vh;
    }

    .controls {
      flex: 0 0 auto;
      max-height: 385px;
      overflow-y: auto;
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
      background: var(--panel);
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px 10px;
      margin-bottom: 10px;
    }

    button, select {
      min-height: 31px;
      padding: 5px 9px;
      border: 1px solid #c7d0dd;
      border-radius: 6px;
      background: #ffffff;
      color: var(--text);
      font: inherit;
      font-size: 13px;
    }

    button { cursor: pointer; }
    button:hover { background: #eef2f7; }

    .primary {
      border-color: var(--primary);
      background: var(--primary);
      color: #ffffff;
    }

    .primary:hover { background: var(--primary-hover); }

    .control-label {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 31px;
      font-size: 13px;
      white-space: nowrap;
      cursor: pointer;
    }

    .mode-box {
      display: inline-flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
      padding: 5px 8px;
      border: 1px solid var(--border);
      border-radius: 7px;
      background: #ffffff;
    }

    .mode-title {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .groups {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(235px, 1fr));
      gap: 9px;
    }

    details {
      padding: 8px 9px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #ffffff;
    }

    summary {
      cursor: pointer;
      font-size: 13px;
      font-weight: 700;
      user-select: none;
    }

    .group-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin: 8px 0;
    }

    .group-actions button {
      min-height: 25px;
      padding: 3px 7px;
      font-size: 11px;
    }

    .commodity-list {
      display: grid;
      gap: 5px;
    }

    .commodity-item {
      display: flex;
      align-items: center;
      gap: 7px;
      min-height: 27px;
      padding: 4px 6px;
      border-left: 5px solid var(--series-color);
      border-radius: 4px;
      background: #fbfcfe;
      cursor: pointer;
      font-size: 12px;
    }

    .commodity-item:hover { background: #f0f4f8; }

    .ticker {
      color: var(--muted);
      font-size: 10px;
    }

    .status {
      margin-top: 10px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.4;
    }

    .chart-shell {
      position: relative;
      flex: 1 1 auto;
      min-height: 0;
      background: #ffffff;
    }

    #chart {
      width: 100%;
      height: 100%;
    }

    .legend {
      position: absolute;
      top: 9px;
      left: 12px;
      right: 60px;
      z-index: 5;
      display: flex;
      flex-wrap: wrap;
      gap: 5px 10px;
      pointer-events: none;
      font-size: 11px;
    }

    .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 2px 5px;
      border-radius: 4px;
      background: rgba(255, 255, 255, 0.88);
      color: #334155;
    }

    .legend-swatch {
      width: 14px;
      height: 3px;
      border-radius: 2px;
      flex: 0 0 auto;
    }

    .tooltip {
      position: absolute;
      top: 42px;
      left: 12px;
      z-index: 6;
      display: none;
      max-width: min(330px, calc(100% - 24px));
      padding: 8px 9px;
      border: 1px solid rgba(148, 163, 184, 0.75);
      border-radius: 7px;
      background: rgba(255, 255, 255, 0.96);
      box-shadow: 0 4px 16px rgba(15, 23, 42, 0.12);
      color: #1e293b;
      font-size: 11px;
      line-height: 1.4;
      pointer-events: none;
    }

    .tooltip-date {
      margin-bottom: 4px;
      color: #475569;
      font-weight: 700;
    }

    .tooltip-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .tooltip-name {
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }

    .tooltip-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex: 0 0 auto;
    }

    .attribution {
      position: absolute;
      right: 8px;
      bottom: 5px;
      z-index: 5;
      color: #64748b;
      font-size: 10px;
    }

    .attribution a {
      color: #2962ff;
      text-decoration: none;
    }

    .empty-state {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      padding: 24px;
      color: var(--muted);
      text-align: center;
      font-size: 15px;
    }

    @media (max-width: 700px) {
      .controls { max-height: 475px; }
      .groups { grid-template-columns: 1fr; }
    }
  </style>
</head>

<body>
  <main class="app">
    <section class="controls">
      <div class="toolbar">
        <button id="energy-only" class="primary" type="button">Nur Energy</button>
        <button id="default-selection" type="button">Standard-Auswahl</button>
        <button id="select-all" type="button">Alle auswählen</button>
        <button id="clear-all" type="button">Alle abwählen</button>

        <label class="control-label">
          Zeitraum:
          <select id="range-select">
            <option value="1y">1 Jahr</option>
            <option value="3y">3 Jahre</option>
            <option value="5y">5 Jahre</option>
            <option value="10y">10 Jahre</option>
            <option value="max" selected>Maximal verfügbar</option>
          </select>
        </label>

        <div class="mode-box" aria-label="Skalierungsmodus">
          <span class="mode-title">Skala:</span>

          <label class="control-label">
            <input type="radio" name="scale-mode" value="price">
            Preis
          </label>

          <label class="control-label">
            <input type="radio" name="scale-mode" value="indexed" checked>
            Indexiert 100
          </label>

          <label class="control-label">
            <input type="radio" name="scale-mode" value="log">
            Logarithmisch
          </label>
        </div>

        <label class="control-label">
          Linienform:
          <select id="line-shape-select">
            <option value="normal" selected>Normal</option>
            <option value="curved">Geglättet / kurvig</option>
          </select>
        </label>
      </div>

      <div id="commodity-groups" class="groups"></div>
      <div id="status" class="status">Datenquelle wird geladen.</div>
    </section>

    <section class="chart-shell">
      <div id="chart"></div>
      <div id="legend" class="legend"></div>
      <div id="tooltip" class="tooltip"></div>

      <div class="attribution">
        Charts by
        <a href="https://www.tradingview.com/" target="_blank" rel="noopener nofollow">
          TradingView
        </a>
        · Lightweight Charts™
      </div>
    </section>
  </main>

  <script>
    /*
      The page itself only reads data/commodities.json from GitHub Pages.
      The GitHub workflow writes this JSON from Yahoo Finance. No browser
      request is made to Yahoo Finance, avoiding CORS errors.
    */

    const COMMODITY_GROUPS = {
      "Energy": [
        { ticker: "CL=F", name: "WTI Crude" },
        { ticker: "BZ=F", name: "Brent Crude" },
        { ticker: "NG=F", name: "Natural Gas" },
        { ticker: "RB=F", name: "RBOB Gasoline" },
        { ticker: "HO=F", name: "Heating Oil" }
      ],
      "Metals": [
        { ticker: "GC=F", name: "Gold" },
        { ticker: "SI=F", name: "Silver" },
        { ticker: "HG=F", name: "Copper" },
        { ticker: "PL=F", name: "Platinum" },
        { ticker: "PA=F", name: "Palladium" },
        { ticker: "ALI=F", name: "Aluminum" }
      ],
      "Grains / Oilseeds": [
        { ticker: "ZC=F", name: "Corn" },
        { ticker: "ZW=F", name: "Wheat" },
        { ticker: "KE=F", name: "KC HRW Wheat" },
        { ticker: "ZS=F", name: "Soybeans" },
        { ticker: "ZL=F", name: "Soybean Oil" },
        { ticker: "ZM=F", name: "Soybean Meal" },
        { ticker: "ZO=F", name: "Oats" },
        { ticker: "ZR=F", name: "Rough Rice" }
      ],
      "Softs": [
        { ticker: "KC=F", name: "Coffee" },
        { ticker: "SB=F", name: "Sugar" },
        { ticker: "CC=F", name: "Cocoa" },
        { ticker: "CT=F", name: "Cotton" },
        { ticker: "OJ=F", name: "Orange Juice" }
      ],
      "Livestock": [
        { ticker: "LE=F", name: "Live Cattle" },
        { ticker: "HE=F", name: "Lean Hogs" },
        { ticker: "GF=F", name: "Feeder Cattle" }
      ]
    };

    const DEFAULT_TICKERS = ["CL=F", "BZ=F", "NG=F", "GC=F", "HG=F", "ZC=F"];

    /*
      Fixed, high-contrast colors. These are used in the actual line chart,
      the legend, the tooltip, and the selection fields.
    */
    const COLOR_BY_TICKER = {
      "CL=F": "#003f5c", "BZ=F": "#ef5675", "NG=F": "#2f4b7c",
      "RB=F": "#ffa600", "HO=F": "#7a5195",

      "GC=F": "#c99700", "SI=F": "#6b7280", "HG=F": "#d04a02",
      "PL=F": "#5d9cec", "PA=F": "#a42cd6", "ALI=F": "#00a6a6",

      "ZC=F": "#6a994e", "ZW=F": "#bc6c25", "KE=F": "#99582a",
      "ZS=F": "#40916c", "ZL=F": "#e9c46a", "ZM=F": "#386641",
      "ZO=F": "#90be6d", "ZR=F": "#577590",

      "KC=F": "#6f4e37", "SB=F": "#e76f51", "CC=F": "#5f0f40",
      "CT=F": "#4d908e", "OJ=F": "#f77f00",

      "LE=F": "#9b2226", "HE=F": "#bb3e03", "GF=F": "#495057"
    };

    const ALL_COMMODITIES = Object.values(COMMODITY_GROUPS).flat();
    const AUTO_REFRESH_MS = 60 * 1000;

    let dataset = null;
    let chart = null;
    let seriesEntries = [];
    let fetchInProgress = false;
    let renderTimer = null;
    let resizeObserver = null;

    function getColor(ticker) {
      return COLOR_BY_TICKER[ticker] || "#1d4ed8";
    }

    function setStatus(text) {
      document.getElementById("status").textContent = text;
    }

    function getScaleMode() {
      const selected = document.querySelector('input[name="scale-mode"]:checked');
      return selected ? selected.value : "indexed";
    }

    function getScaleText(mode) {
      if (mode === "price") return "Preis";
      if (mode === "log") return "logarithmischer Preis";
      return "Indexiert auf 100";
    }

    function getLineType() {
      const lineShape = document.getElementById("line-shape-select").value;

      return lineShape === "curved"
        ? LightweightCharts.LineType.Curved
        : LightweightCharts.LineType.Simple;
    }

    function getLineShapeText() {
      return document.getElementById("line-shape-select").value === "curved"
        ? "geglättete Linien"
        : "normale Linien";
    }

    function formatTimestamp(timestamp) {
      if (!timestamp) return "unbekannt";
      const date = new Date(timestamp);
      if (Number.isNaN(date.valueOf())) return timestamp;

      return new Intl.DateTimeFormat("de-DE", {
        dateStyle: "medium",
        timeStyle: "short"
      }).format(date);
    }

    function formatDate(time) {
      if (typeof time === "string") {
        return new Intl.DateTimeFormat("de-DE", { dateStyle: "medium" })
          .format(new Date(`${time}T12:00:00Z`));
      }

      if (time && typeof time === "object" && "year" in time) {
        return `${String(time.day).padStart(2, "0")}.${String(time.month).padStart(2, "0")}.${time.year}`;
      }

      return "";
    }

    function formatValue(value, mode) {
      if (!Number.isFinite(value)) return "–";

      if (mode === "indexed") {
        return value.toLocaleString("de-DE", {
          minimumFractionDigits: 2,
          maximumFractionDigits: 2
        });
      }

      return value.toLocaleString("de-DE", { maximumSignificantDigits: 6 });
    }

    function buildControls() {
      const root = document.getElementById("commodity-groups");
      root.innerHTML = "";

      Object.entries(COMMODITY_GROUPS).forEach(([groupName, commodities], index) => {
        const details = document.createElement("details");
        details.open = index < 2;

        const summary = document.createElement("summary");
        summary.textContent = groupName;

        const actions = document.createElement("div");
        actions.className = "group-actions";

        const onlyButton = document.createElement("button");
        onlyButton.type = "button";
        onlyButton.textContent = "Nur diese Gruppe";
        onlyButton.addEventListener("click", (event) => {
          event.preventDefault();
          event.stopPropagation();
          setCheckedTickers(commodities.map(item => item.ticker));
          requestRender();
        });

        const addButton = document.createElement("button");
        addButton.type = "button";
        addButton.textContent = "Gruppe ergänzen";
        addButton.addEventListener("click", (event) => {
          event.preventDefault();
          event.stopPropagation();

          const groupTickers = new Set(commodities.map(item => item.ticker));
          document.querySelectorAll(".commodity-checkbox").forEach((checkbox) => {
            if (groupTickers.has(checkbox.value)) checkbox.checked = true;
          });
          requestRender();
        });

        actions.append(onlyButton, addButton);

        const list = document.createElement("div");
        list.className = "commodity-list";

        commodities.forEach((commodity) => {
          const label = document.createElement("label");
          label.className = "commodity-item";
          label.style.setProperty("--series-color", getColor(commodity.ticker));

          const checkbox = document.createElement("input");
          checkbox.type = "checkbox";
          checkbox.className = "commodity-checkbox";
          checkbox.value = commodity.ticker;
          checkbox.dataset.name = commodity.name;
          checkbox.checked = DEFAULT_TICKERS.includes(commodity.ticker);
          checkbox.addEventListener("change", requestRender);

          const text = document.createElement("span");
          text.textContent = commodity.name;

          const ticker = document.createElement("span");
          ticker.className = "ticker";
          ticker.textContent = ` (${commodity.ticker})`;

          text.appendChild(ticker);
          label.append(checkbox, text);
          list.appendChild(label);
        });

        details.append(summary, actions, list);
        root.appendChild(details);
      });
    }

    function getCheckedTickers() {
      return Array.from(document.querySelectorAll(".commodity-checkbox:checked"))
        .map((checkbox) => checkbox.value);
    }

    function setCheckedTickers(tickers) {
      const target = new Set(tickers);
      document.querySelectorAll(".commodity-checkbox").forEach((checkbox) => {
        checkbox.checked = target.has(checkbox.value);
      });
    }

    function getSelectedSeries() {
      if (!dataset?.series) return [];
      const selected = new Set(getCheckedTickers());
      return dataset.series.filter((series) => selected.has(series.ticker));
    }

    function getCutoffDate(rangeKey) {
      if (rangeKey === "max") return null;
      const cutoff = new Date();
      cutoff.setFullYear(cutoff.getFullYear() - Number.parseInt(rangeKey, 10));
      return cutoff;
    }

    function transformData(series, mode, cutoff) {
      let points = (series.data || [])
        .map(([time, value]) => ({
          time,
          value: Number(value),
          date: new Date(`${time}T12:00:00Z`)
        }))
        .filter((point) => Number.isFinite(point.value) && point.value > 0)
        .filter((point) => !cutoff || point.date >= cutoff);

      if (!points.length) return [];

      if (mode === "indexed") {
        const base = points[0].value;
        return points.map((point) => ({
          time: point.time,
          value: (point.value / base) * 100
        }));
      }

      return points.map((point) => ({ time: point.time, value: point.value }));
    }

    function resetChart() {
      if (resizeObserver) {
        resizeObserver.disconnect();
        resizeObserver = null;
      }

      if (chart) {
        chart.remove();
        chart = null;
      }

      seriesEntries = [];
      document.getElementById("chart").innerHTML = "";
      document.getElementById("legend").innerHTML = "";
      document.getElementById("tooltip").style.display = "none";
    }

    function createChart() {
      const container = document.getElementById("chart");

      chart = LightweightCharts.createChart(container, {
        width: Math.max(container.clientWidth, 1),
        height: Math.max(container.clientHeight, 1),
        layout: {
          background: { type: "solid", color: "#ffffff" },
          textColor: "#475569",
          fontFamily: "Arial, Helvetica, sans-serif",
          fontSize: 12
        },
        grid: {
          vertLines: { visible: false },
          horzLines: { visible: false }
        },
        leftPriceScale: { visible: false },
        rightPriceScale: {
          visible: true,
          borderColor: "#cbd5e1",
          entireTextOnly: true
        },
        timeScale: {
          borderColor: "#cbd5e1",
          timeVisible: false,
          secondsVisible: false,
          rightOffset: 2,
          barSpacing: 7,
          minBarSpacing: 2
        },
        crosshair: {
          vertLine: {
            color: "rgba(30, 41, 59, 0.45)",
            width: 1,
            style: LightweightCharts.LineStyle.Dashed,
            labelBackgroundColor: "#475569"
          },
          horzLine: {
            color: "rgba(30, 41, 59, 0.30)",
            width: 1,
            style: LightweightCharts.LineStyle.Dashed,
            labelBackgroundColor: "#475569"
          }
        },
        handleScroll: true,
        handleScale: true
      });

      resizeObserver = new ResizeObserver(() => {
        if (!chart) return;
        chart.applyOptions({
          width: Math.max(container.clientWidth, 1),
          height: Math.max(container.clientHeight, 1)
        });
      });

      resizeObserver.observe(container);
      chart.subscribeCrosshairMove(updateTooltip);
    }

    function setPriceScaleMode(mode) {
      const scaleMode = mode === "log"
        ? LightweightCharts.PriceScaleMode.Logarithmic
        : LightweightCharts.PriceScaleMode.Normal;

      chart.applyOptions({
        rightPriceScale: {
          mode: scaleMode,
          autoScale: true
        }
      });
    }

    function addLegend(entry) {
      const legend = document.getElementById("legend");

      const item = document.createElement("span");
      item.className = "legend-item";

      const swatch = document.createElement("span");
      swatch.className = "legend-swatch";
      swatch.style.background = entry.color;

      const name = document.createElement("span");
      name.textContent = entry.name;

      item.append(swatch, name);
      legend.appendChild(item);
    }

    function updateTooltip(param) {
      const tooltip = document.getElementById("tooltip");

      if (!param?.time || !param?.point || param.point.x < 0 || param.point.y < 0) {
        tooltip.style.display = "none";
        return;
      }

      const mode = getScaleMode();
      const rows = [];

      seriesEntries.forEach((entry) => {
        const point = param.seriesData.get(entry.api);
        if (!point || !Number.isFinite(point.value)) return;

        rows.push(`
          <div class="tooltip-row">
            <span class="tooltip-name">
              <span class="tooltip-dot" style="background:${entry.color}"></span>
              ${entry.name}
            </span>
            <strong>${formatValue(point.value, mode)}</strong>
          </div>
        `);
      });

      if (!rows.length) {
        tooltip.style.display = "none";
        return;
      }

      tooltip.innerHTML = `
        <div class="tooltip-date">${formatDate(param.time)}</div>
        ${rows.join("")}
      `;
      tooltip.style.display = "block";
    }

    function renderChart() {
      if (!dataset) return;

      if (!window.LightweightCharts) {
        setStatus("Die Chart-Bibliothek konnte nicht geladen werden. Bitte die Seite neu laden.");
        return;
      }

      const selected = getSelectedSeries();
      const range = document.getElementById("range-select").value;
      const mode = getScaleMode();
      const cutoff = getCutoffDate(range);
      const chartElement = document.getElementById("chart");

      if (!selected.length) {
        resetChart();
        chartElement.innerHTML = `<div class="empty-state">Bitte mindestens einen Rohstoff auswählen.</div>`;
        setStatus("Keine Zeitreihe ausgewählt.");
        return;
      }

      resetChart();
      createChart();
      setPriceScaleMode(mode);

      selected.forEach((series) => {
        const data = transformData(series, mode, cutoff);
        if (!data.length) return;

        const color = getColor(series.ticker);

        const api = chart.addSeries(LightweightCharts.LineSeries, {
          color,
          lineWidth: 2,
          lineType: getLineType(),
          crosshairMarkerVisible: true,
          crosshairMarkerRadius: 4,
          crosshairMarkerBorderColor: color,
          crosshairMarkerBackgroundColor: "#ffffff",
          lastValueVisible: false,
          priceLineVisible: false,
          title: series.name,
          priceFormat: {
            type: "price",
            precision: mode === "indexed" ? 2 : 4,
            minMove: mode === "indexed" ? 0.01 : 0.0001
          }
        });

        api.setData(data);

        const entry = { api, name: series.name, color };
        seriesEntries.push(entry);
        addLegend(entry);
      });

      if (!seriesEntries.length) {
        resetChart();
        chartElement.innerHTML = `<div class="empty-state">Für die aktuelle Auswahl liegen keine Daten vor.</div>`;
        setStatus("Für diese Auswahl liegen keine darstellbaren Daten vor.");
        return;
      }

      chart.timeScale().fitContent();

      setStatus(
        `${seriesEntries.length} Reihen · ${getScaleText(mode)} · ` +
        `${getLineShapeText()} · tägliche Schlusskurse · ` +
        `Datenstand: ${formatTimestamp(dataset.generated_at)} · ` +
        `Prüfung auf neue Daten alle 60 Sekunden.`
      );
    }

    function requestRender() {
      clearTimeout(renderTimer);
      renderTimer = window.setTimeout(renderChart, 70);
    }

    async function loadData({ silent = false } = {}) {
      if (fetchInProgress) return;
      fetchInProgress = true;

      try {
        const response = await fetch(`data/commodities.json?cache=${Date.now()}`, {
          cache: "no-store"
        });

        if (!response.ok) throw new Error(`HTTP ${response.status}`);

        const nextDataset = await response.json();

        if (!Array.isArray(nextDataset.series) || !nextDataset.series.length) {
          throw new Error("Die Datendatei enthält noch keine Zeitreihen.");
        }

        const oldSignature = dataset
          ? `${dataset.generated_at}|${dataset.series.length}`
          : "";

        const newSignature =
          `${nextDataset.generated_at}|${nextDataset.series.length}`;

        dataset = nextDataset;

        if (!silent || oldSignature !== newSignature) renderChart();
      } catch (error) {
        if (!dataset) {
          resetChart();
          document.getElementById("chart").innerHTML = `
            <div class="empty-state">
              Noch keine Daten verfügbar. Starte einmal den GitHub-Workflow
              <b>Update data and deploy dashboard</b> im Tab <b>Actions</b>.
            </div>
          `;
        }

        setStatus(`Daten konnten nicht geladen werden: ${error.message}`);
      } finally {
        fetchInProgress = false;
      }
    }

    document.getElementById("energy-only").addEventListener("click", () => {
      setCheckedTickers(COMMODITY_GROUPS.Energy.map(item => item.ticker));
      requestRender();
    });

    document.getElementById("default-selection").addEventListener("click", () => {
      setCheckedTickers(DEFAULT_TICKERS);
      requestRender();
    });

    document.getElementById("select-all").addEventListener("click", () => {
      setCheckedTickers(ALL_COMMODITIES.map(item => item.ticker));
      requestRender();
    });

    document.getElementById("clear-all").addEventListener("click", () => {
      setCheckedTickers([]);
      requestRender();
    });

    document.getElementById("range-select").addEventListener("change", requestRender);
    document.getElementById("line-shape-select").addEventListener("change", requestRender);

    document.querySelectorAll('input[name="scale-mode"]').forEach((input) => {
      input.addEventListener("change", requestRender);
    });

    buildControls();
    loadData();

    // The page checks whether the deployed JSON has changed every minute.
    window.setInterval(() => loadData({ silent: true }), AUTO_REFRESH_MS);
  </script>
</body>
</html>
