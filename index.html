<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >
  <title>Aktienchart</title>

  <style>
    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #ffffff;
      font-family: Arial, Helvetica, sans-serif;
    }

    .tradingview-widget-container,
    .tradingview-widget-container__widget {
      width: 100%;
      height: 100%;
    }
  </style>
</head>

<body>
  <div class="tradingview-widget-container">
    <div
      id="tradingview-chart"
      class="tradingview-widget-container__widget"
    ></div>
  </div>

  <script>
    /*
      Symbol aus der URL auslesen.

      Beispiele:
      ?symbol=NASDAQ%3AAAPL  → Apple
      ?symbol=XETR%3ASAP     → SAP
      ?symbol=NYSE%3AXOM     → ExxonMobil

      Ohne Symbol wird Apple geladen.
    */
    const urlParameters = new URLSearchParams(window.location.search);

    const symbolFromUrl =
      urlParameters.get("symbol") || "NASDAQ:AAPL";

    const symbol = symbolFromUrl.trim().toUpperCase();

    document.title = symbol + " – Aktienchart";

    /*
      TradingView-Widget dynamisch erzeugen.
      Die obere Leiste bleibt sichtbar, damit dort die
      TradingView-Suche mit Vorschlägen genutzt werden kann.
    */
    const widgetContainer = document.getElementById("tradingview-chart");

    const tradingViewScript = document.createElement("script");

    tradingViewScript.type = "text/javascript";
    tradingViewScript.src =
      "https://s3.tradingview.com/external-embedding/embed-widget-advanced-chart.js";

    tradingViewScript.async = true;

    tradingViewScript.text = JSON.stringify({
      autosize: true,

      symbol: symbol,
      interval: "D",
      timezone: "Europe/Berlin",
      theme: "light",
      style: "3",
      locale: "de_DE",

      /*
        Die obere Leiste bleibt an:
        Dort klickst du auf den Ticker und kannst nach
        Unternehmen oder Symbolen suchen.
      */
      hide_top_toolbar: false,
      allow_symbol_change: true,

      /*
        Alles andere möglichst schlank halten.
      */
      hide_side_toolbar: true,
      hide_legend: true,
      hide_volume: true,
      withdateranges: false,

      save_image: false,
      calendar: false,
      details: false,
      hotlist: false,
      watchlist: [],

      backgroundColor: "rgba(255, 255, 255, 1)",
      gridColor: "rgba(46, 46, 46, 0.06)",

      studies: [],
      support_host: "https://www.tradingview.com"
    });

    widgetContainer.appendChild(tradingViewScript);
  </script>
</body>
</html>
