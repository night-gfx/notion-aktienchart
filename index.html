<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Rohstoff-CFD Vergleich</title>

  <style>
    :root {
      --background: #ffffff;
      --panel: #f7f7f7;
      --border: #d9d9d9;
      --text: #1d1d1f;
      --muted: #666666;
      --button: #ffffff;
      --button-hover: #ececec;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      background: var(--background);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      overflow: hidden;
    }

    .page {
      display: flex;
      flex-direction: column;
      width: 100%;
      height: 100vh;
    }

    .controls {
      flex: 0 0 auto;
      max-height: 360px;
      overflow-y: auto;
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
      background: var(--panel);
    }

    .top-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px 10px;
      margin-bottom: 10px;
    }

    button,
    select,
    input[type="text"] {
      min-height: 31px;
      padding: 5px 9px;
      border: 1px solid #c9c9c9;
      border-radius: 6px;
      background: var(--button);
      color: var(--text);
      font-family: inherit;
      font-size: 13px;
    }

    button {
      cursor: pointer;
    }

    button:hover {
      background: var(--button-hover);
    }

    .primary-button {
      border-color: #2f6fed;
      background: #2f6fed;
      color: #ffffff;
    }

    .primary-button:hover {
      background: #2156be;
    }

    .control-label {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 30px;
      font-size: 13px;
      cursor: pointer;
      white-space: nowrap;
    }

    .scale-box {
      display: inline-flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
      padding: 5px 8px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: #ffffff;
    }

    .scale-title {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .custom-symbol-row {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      margin-bottom: 10px;
    }

    #custom-symbol {
      width: min(290px, 100%);
    }

    .groups {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(235px, 1fr));
      gap: 9px;
    }

    details {
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #ffffff;
      padding: 8px 9px;
    }

    summary {
      cursor: pointer;
      font-size: 13px;
      font-weight: 700;
      user-select: none;
    }

    .group-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin: 8px 0 7px 0;
    }

    .group-actions button {
      min-height: 25px;
      padding: 3px 7px;
      font-size: 11px;
    }

    .commodity-list {
      display: grid;
      gap: 5px;
    }

    .commodity-item {
      display: flex;
      align-items: center;
      gap: 7px;
      min-height: 27px;
      padding: 4px 6px;
      border-left: 5px solid var(--series-color);
      border-radius: 4px;
      background: #fbfbfb;
      font-size: 12px;
      cursor: pointer;
    }

    .commodity-item:hover {
      background: #f1f1f1;
    }

    .symbol-code {
      color: var(--muted);
      font-size: 10px;
    }

    .custom-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 10px;
    }

    .custom-item {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 7px;
      border-left: 5px solid var(--series-color);
      border-radius: 6px;
      background: #ffffff;
      border-top: 1px solid var(--border);
      border-right: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      font-size: 12px;
    }

    .custom-item button {
      min-height: auto;
      padding: 0 3px;
      border: none;
      background: transparent;
      color: #777777;
      font-size: 16px;
      line-height: 1;
    }

    .custom-item button:hover {
      color: #000000;
      background: transparent;
    }

    .status {
      margin-top: 10px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }

    .chart-host {
      flex: 1 1 auto;
      min-height: 0;
      width: 100%;
      background: #ffffff;
    }

    .tradingview-widget-container,
    .tradingview-widget-container__widget {
      width: 100%;
      height: 100%;
    }

    .tradingview-widget-copyright {
      height: 28px;
      padding: 5px 8px;
      color: #777777;
      font-size: 10px;
      text-align: right;
    }

    .tradingview-widget-copyright a {
      color: #2962ff;
      text-decoration: none;
    }

    .empty-state {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      padding: 20px;
      color: #666666;
      font-size: 15px;
      text-align: center;
    }

    @media (max-width: 700px) {
      .controls {
        max-height: 430px;
      }

      .groups {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <main class="page">

    <section class="controls">

      <div class="top-row">
        <button id="energy-only" type="button" class="primary-button">
          Nur Energy
        </button>

        <button id="standard-selection" type="button">
          Standard-Auswahl
        </button>

        <button id="select-all" type="button">
          Alle auswählen
        </button>

        <button id="clear-all" type="button">
          Alle abwählen
        </button>

        <label class="control-label">
          Zeitraum:
          <select id="range-select">
            <option value="12M">1 Jahr</option>
            <option value="36M">3 Jahre</option>
            <option value="60M">5 Jahre</option>
            <option value="120M">10 Jahre</option>
            <option value="ALL" selected>Maximal verfügbar</option>
          </select>
        </label>

        <div class="scale-box">
          <span class="scale-title">Skala:</span>

          <label class="control-label">
            <input
              type="radio"
              name="scale-mode"
              value="price"
            />
            Preis
          </label>

          <label class="control-label">
            <input
              type="radio"
              name="scale-mode"
              value="indexed"
              checked
            />
            Indexiert 100
          </label>

          <label class="control-label">
            <input
              type="radio"
              name="scale-mode"
              value="log"
            />
            Logarithmisch
          </label>
        </div>
      </div>

      <div class="custom-symbol-row">
        <input
          id="custom-symbol"
          type="text"
          placeholder="Eigenes TradingView-CFD-Symbol, z. B. CAPITALCOM:NICKEL"
          autocomplete="off"
        />

        <button id="add-custom-symbol" type="button">
          Eigenes Symbol hinzufügen
        </button>
      </div>

      <div id="commodity-groups" class="groups"></div>

      <div id="custom-symbol-list" class="custom-list"></div>

      <div id="status" class="status">
        Rohstoff-CFDs werden geladen.
      </div>
    </section>

    <section id="chart-host" class="chart-host"></section>

  </main>

  <script>
    /*
      TradingView-CFD-/Cash-Symbole.

      Die Daten sind keine Futures-Kontrakte wie COMEX:GC1!,
      sondern Spot-/Cash- bzw. CFD-Proxys verschiedener Anbieter.
    */
    const COMMODITY_GROUPS = {
      "Energy": [
        {
          name: "WTI Crude",
          symbol: "TVC:USOIL"
        },
        {
          name: "Brent Crude",
          symbol: "TVC:UKOIL"
        },
        {
          name: "Natural Gas",
          symbol: "OANDA:NATGASUSD"
        },
        {
          name: "Gasoline",
          symbol: "CAPITALCOM:GASOLINE"
        },
        {
          name: "Heating Oil",
          symbol: "CAPITALCOM:HEATINGOIL"
        },
        {
          name: "London Gasoil",
          symbol: "CAPITALCOM:GASOIL"
        }
      ],

      "Metals": [
        {
          name: "Gold",
          symbol: "TVC:GOLD"
        },
        {
          name: "Silver",
          symbol: "TVC:SILVER"
        },
        {
          name: "Copper",
          symbol: "CAPITALCOM:XCUUSD"
        },
        {
          name: "Platinum",
          symbol: "TVC:PLATINUM"
        },
        {
          name: "Palladium",
          symbol: "TVC:PALLADIUM"
        },
        {
          name: "Aluminium",
          symbol: "CAPITALCOM:ALUMINUM"
        },
        {
          name: "Nickel",
          symbol: "CAPITALCOM:NICKEL"
        },
        {
          name: "Zinc",
          symbol: "CAPITALCOM:MZN3"
        },
        {
          name: "Lead",
          symbol: "CAPITALCOM:LEAD"
        }
      ],

      "Grains / Oilseeds": [
        {
          name: "Corn",
          symbol: "OANDA:CORNUSD"
        },
        {
          name: "Wheat",
          symbol: "OANDA:WHEATUSD"
        },
        {
          name: "Soybeans",
          symbol: "OANDA:SOYBNUSD"
        },
        {
          name: "Soybean Oil",
          symbol: "FOREXCOM:SOYUSD"
        },
        {
          name: "Soybean Meal",
          symbol: "CMCMARKETS:SOYMEAL"
        }
      ],

      "Softs": [
        {
          name: "Coffee",
          symbol: "FOREXCOM:COFFEE"
        },
        {
          name: "Sugar",
          symbol: "FOREXCOM:SUGAR"
        },
        {
          name: "Cocoa",
          symbol: "CAPITALCOM:COCOA"
        },
        {
          name: "Cotton",
          symbol: "FOREXCOM:COTTON"
        },
        {
          name: "Orange Juice",
          symbol: "CITYINDEX:ORANGEJUICECFD"
        }
      ],

      "Livestock": [
        {
          name: "Live Cattle",
          symbol: "CITYINDEX:LIVECATTLECFD"
        },
        {
          name: "Lean Hogs",
          symbol: "CITYINDEX:LEANHOGSCFD"
        }
      ]
    };

    /*
      Hoher Kontrast für die Auswahlfelder und die Hauptlinie.
      TradingView legt die Farben weiterer Vergleichsreihen selbst fest.
    */
    const COLOR_PALETTE = [
      "#005F73",
      "#D00000",
      "#0077B6",
      "#7B2CBF",
      "#D97706",
      "#2A9D8F",
      "#C1121F",
      "#4D7C0F",
      "#A21CAF",
      "#0F766E",
      "#9A3412",
      "#1D4ED8"
    ];

    const DEFAULT_SYMBOLS = [
      "TVC:USOIL",
      "TVC:UKOIL",
      "OANDA:NATGASUSD",
      "TVC:GOLD",
      "TVC:SILVER",
      "CAPITALCOM:XCUUSD"
    ];

    /*
      Bei mehr Reihen wiederholt TradingView später seine Farben.
      Für einen gut lesbaren Vergleich werden maximal zwölf Reihen gerendert.
    */
    const MAX_RENDERED_SERIES = 12;
    const AUTO_REFRESH_MS = 60 * 1000;

    const ALL_COMMODITIES = Object.values(COMMODITY_GROUPS).flat();

    let customSymbols = [];
    let renderTimeout = null;

    function setStatus(message) {
      document.getElementById("status").textContent = message;
    }

    function normaliseSymbol(symbol) {
      return symbol.trim().toUpperCase();
    }

    function isValidTradingViewSymbol(symbol) {
      return /^[A-Z0-9_]+:[A-Z0-9!._-]+$/.test(symbol);
    }

    function getColorForSymbol(symbol) {
      const knownIndex = ALL_COMMODITIES.findIndex(
        (item) => item.symbol === symbol
      );

      const customIndex = customSymbols.findIndex(
        (item) => item.symbol === symbol
      );

      const index = knownIndex >= 0
        ? knownIndex
        : ALL_COMMODITIES.length + Math.max(customIndex, 0);

      return COLOR_PALETTE[index % COLOR_PALETTE.length];
    }

    function createCommodityLabel(commodity) {
      const label = document.createElement("label");
      label.className = "commodity-item";

      label.style.setProperty(
        "--series-color",
        getColorForSymbol(commodity.symbol)
      );

      const checkbox = document.createElement("input");
      checkbox.type = "checkbox";
      checkbox.className = "commodity-checkbox";
      checkbox.value = commodity.symbol;
      checkbox.dataset.name = commodity.name;

      checkbox.checked = DEFAULT_SYMBOLS.includes(commodity.symbol);

      checkbox.addEventListener("change", scheduleRender);

      const text = document.createElement("span");

      const name = document.createElement("span");
      name.textContent = commodity.name;

      const symbol = document.createElement("span");
      symbol.className = "symbol-code";
      symbol.textContent = ` (${commodity.symbol})`;

      text.appendChild(name);
      text.appendChild(symbol);

      label.appendChild(checkbox);
      label.appendChild(text);

      return label;
    }

    function buildCommodityGroups() {
      const container = document.getElementById("commodity-groups");
      container.innerHTML = "";

      Object.entries(COMMODITY_GROUPS).forEach(
        ([groupName, commodities], groupIndex) => {
          const details = document.createElement("details");

          if (groupIndex < 2) {
            details.open = true;
          }

          const summary = document.createElement("summary");
          summary.textContent = groupName;

          const actions = document.createElement("div");
          actions.className = "group-actions";

          const onlyButton = document.createElement("button");
          onlyButton.type = "button";
          onlyButton.textContent = "Nur diese Gruppe";

          onlyButton.addEventListener("click", (event) => {
            event.preventDefault();
            event.stopPropagation();
            selectOnlyGroup(groupName);
          });

          const addButton = document.createElement("button");
          addButton.type = "button";
          addButton.textContent = "Gruppe ergänzen";

          addButton.addEventListener("click", (event) => {
            event.preventDefault();
            event.stopPropagation();
            addGroup(groupName);
          });

          actions.appendChild(onlyButton);
          actions.appendChild(addButton);

          const list = document.createElement("div");
          list.className = "commodity-list";

          commodities.forEach((commodity) => {
            list.appendChild(createCommodityLabel(commodity));
          });

          details.appendChild(summary);
          details.appendChild(actions);
          details.appendChild(list);

          container.appendChild(details);
        }
      );
    }

    function getCheckedSymbols() {
      return Array.from(
        document.querySelectorAll(".commodity-checkbox:checked")
      ).map((checkbox) => checkbox.value);
    }

    function setCheckedSymbols(symbols) {
      const targetSymbols = new Set(symbols);

      document.querySelectorAll(".commodity-checkbox").forEach(
        (checkbox) => {
          checkbox.checked = targetSymbols.has(checkbox.value);
        }
      );
    }

    function getSelectedAssets() {
      const knownAssets = Array.from(
        document.querySelectorAll(".commodity-checkbox:checked")
      ).map((checkbox) => ({
        name: checkbox.dataset.name,
        symbol: checkbox.value,
        color: getColorForSymbol(checkbox.value)
      }));

      const customAssets = customSymbols.map((item) => ({
        name: item.name,
        symbol: item.symbol,
        color: getColorForSymbol(item.symbol)
      }));

      const uniqueSymbols = new Set();

      return [...knownAssets, ...customAssets].filter((asset) => {
        if (uniqueSymbols.has(asset.symbol)) {
          return false;
        }

        uniqueSymbols.add(asset.symbol);
        return true;
      });
    }

    function getCurrentScaleMode() {
      const selected = document.querySelector(
        'input[name="scale-mode"]:checked'
      );

      return selected ? selected.value : "indexed";
    }

    function getScaleLabel(scaleMode) {
      if (scaleMode === "price") {
        return "Preis";
      }

      if (scaleMode === "log") {
        return "logarithmischer Preis";
      }

      return "Indexiert auf 100";
    }

    function selectOnlyGroup(groupName) {
      const groupSymbols = COMMODITY_GROUPS[groupName].map(
        (commodity) => commodity.symbol
      );

      setCheckedSymbols(groupSymbols);
      customSymbols = [];
      renderCustomSymbols();
      renderTradingViewChart();
    }

    function addGroup(groupName) {
      const groupSymbols = new Set(
        COMMODITY_GROUPS[groupName].map(
          (commodity) => commodity.symbol
        )
      );

      document.querySelectorAll(".commodity-checkbox").forEach(
        (checkbox) => {
          if (groupSymbols.has(checkbox.value)) {
            checkbox.checked = true;
          }
        }
      );

      renderTradingViewChart();
    }

    function selectAll() {
      const allSymbols = ALL_COMMODITIES.map(
        (commodity) => commodity.symbol
      );

      setCheckedSymbols(allSymbols);
      renderTradingViewChart();
    }

    function clearAll() {
      setCheckedSymbols([]);
      customSymbols = [];
      renderCustomSymbols();
      renderTradingViewChart();
    }

    function selectDefault() {
      setCheckedSymbols(DEFAULT_SYMBOLS);
      customSymbols = [];
      renderCustomSymbols();
      renderTradingViewChart();
    }

    function renderCustomSymbols() {
      const container = document.getElementById("custom-symbol-list");
      container.innerHTML = "";

      customSymbols.forEach((item, index) => {
        const wrapper = document.createElement("div");
        wrapper.className = "custom-item";

        wrapper.style.setProperty(
          "--series-color",
          getColorForSymbol(item.symbol)
        );

        const text = document.createElement("span");
        text.textContent = `${item.name} (${item.symbol})`;

        const removeButton = document.createElement("button");
        removeButton.type = "button";
        removeButton.title = "Entfernen";
        removeButton.textContent = "×";

        removeButton.addEventListener("click", () => {
          customSymbols.splice(index, 1);
          renderCustomSymbols();
          renderTradingViewChart();
        });

        wrapper.appendChild(text);
        wrapper.appendChild(removeButton);

        container.appendChild(wrapper);
      });
    }

    function addCustomSymbol() {
      const input = document.getElementById("custom-symbol");
      const symbol = normaliseSymbol(input.value);

      if (!symbol) {
        return;
      }

      if (!isValidTradingViewSymbol(symbol)) {
        setStatus(
          "Ungültiges Format. Beispiel: CAPITALCOM:NICKEL"
        );
        return;
      }

      const alreadySelected = getSelectedAssets().some(
        (asset) => asset.symbol === symbol
      );

      if (alreadySelected) {
        setStatus(`${symbol} ist bereits ausgewählt.`);
        input.value = "";
        return;
      }

      customSymbols.push({
        name: symbol,
        symbol: symbol
      });

      input.value = "";
      renderCustomSymbols();
      renderTradingViewChart();
    }

    function writeStateToUrl(assets, range, scaleMode) {
      const params = new URLSearchParams(window.location.search);

      params.set(
        "symbols",
        assets.map((asset) => asset.symbol).join(",")
      );

      params.set("range", range);
      params.set("scale", scaleMode);

      const newUrl =
        window.location.pathname + "?" + params.toString();

      history.replaceState({}, "", newUrl);
    }

    function loadStateFromUrl() {
      const params = new URLSearchParams(window.location.search);

      const symbolsParam = params.get("symbols");
      const rangeParam = params.get("range");
      const scaleParam = params.get("scale");

      if (rangeParam) {
        const rangeSelect = document.getElementById("range-select");

        const isAllowed = Array.from(rangeSelect.options).some(
          (option) => option.value === rangeParam
        );

        if (isAllowed) {
          rangeSelect.value = rangeParam;
        }
      }

      if (
        scaleParam === "price" ||
        scaleParam === "indexed" ||
        scaleParam === "log"
      ) {
        const scaleInput = document.querySelector(
          `input[name="scale-mode"][value="${scaleParam}"]`
        );

        if (scaleInput) {
          scaleInput.checked = true;
        }
      }

      if (!symbolsParam) {
        return;
      }

      const requestedSymbols = symbolsParam
        .split(",")
        .map((symbol) => normaliseSymbol(symbol))
        .filter(Boolean);

      const knownSymbols = new Set();

      document.querySelectorAll(".commodity-checkbox").forEach(
        (checkbox) => {
          knownSymbols.add(checkbox.value);

          checkbox.checked = requestedSymbols.includes(
            checkbox.value
          );
        }
      );

      requestedSymbols.forEach((symbol) => {
        if (
          !knownSymbols.has(symbol) &&
          isValidTradingViewSymbol(symbol)
        ) {
          customSymbols.push({
            name: symbol,
            symbol: symbol
          });
        }
      });

      renderCustomSymbols();
    }

    function buildScaleOverrides(scaleMode, mainColor) {
      const isIndexed = scaleMode === "indexed";
      const isLog = scaleMode === "log";

      return {
        "mainSeriesProperties.priceAxisProperties.autoScale": true,
        "mainSeriesProperties.priceAxisProperties.percentage": false,
        "mainSeriesProperties.priceAxisProperties.indexedTo100": isIndexed,
        "mainSeriesProperties.priceAxisProperties.log": isLog,
        "mainSeriesProperties.priceAxisProperties.logDisabled": false,
        "mainSeriesProperties.priceAxisProperties.percentageDisabled": false,

        "mainSeriesProperties.lineStyle.color": mainColor,
        "mainSeriesProperties.lineStyle.linewidth": 2
      };
    }

    function renderEmptyState(message) {
      const chartHost = document.getElementById("chart-host");

      chartHost.innerHTML = `
        <div class="empty-state">
          ${message}
        </div>
      `;
    }

    function renderTradingViewChart() {
      const selectedAssets = getSelectedAssets();
      const range = document.getElementById("range-select").value;
      const scaleMode = getCurrentScaleMode();

      if (selectedAssets.length === 0) {
        renderEmptyState(
          "Bitte mindestens einen Rohstoff-CFD auswählen."
        );

        setStatus("Keine Zeitreihe ausgewählt.");
        return;
      }

      const assets = selectedAssets.slice(0, MAX_RENDERED_SERIES);
      const mainAsset = assets[0];

      const compareSymbols = assets.slice(1).map((asset) => ({
        symbol: asset.symbol,
        position: "SameScale"
      }));

      const chartHost = document.getElementById("chart-host");

      const widgetContainer = document.createElement("div");
      widgetContainer.className = "tradingview-widget-container";
      widgetContainer.style.width = "100%";
      widgetContainer.style.height = "100%";

      const widget = document.createElement("div");
      widget.className = "tradingview-widget-container__widget";
      widget.style.width = "100%";
      widget.style.height = "calc(100% - 28px)";

      const attribution = document.createElement("div");
      attribution.className = "tradingview-widget-copyright";

      const attributionLink = document.createElement("a");
      attributionLink.href = "https://www.tradingview.com/";
      attributionLink.target = "_blank";
      attributionLink.rel = "noopener nofollow";
      attributionLink.textContent = "Charts by TradingView";

      attribution.appendChild(attributionLink);

      const script = document.createElement("script");
      script.type = "text/javascript";
      script.async = true;
      script.src =
        "https://s3.tradingview.com/external-embedding/embed-widget-advanced-chart.js";

      script.textContent = JSON.stringify({
        autosize: true,

        symbol: mainAsset.symbol,
        interval: "D",
        range: range,

        timezone: "Europe/Berlin",
        theme: "light",
        locale: "de_DE",

        /*
          2 = Linienchart
        */
        style: "2",

        /*
          Die Steuerung erfolgt über die eigenen Auswahlfelder oben.
        */
        hide_top_toolbar: true,
        hide_side_toolbar: true,
        hide_volume: true,
        hide_legend: false,
        withdateranges: false,

        allow_symbol_change: false,
        save_image: false,
        calendar: false,
        details: false,
        hotlist: false,
        watchlist: [],
        studies: [],

        /*
          Weitere Rohstoffe als Vergleichsreihen.
        */
        compareSymbols: compareSymbols,

        /*
          Preis / Indexiert auf 100 / Logarithmisch.
        */
        overrides: buildScaleOverrides(
          scaleMode,
          mainAsset.color
        ),

        /*
          Stellt sicher, dass beim Neuaufbau keine alte lokale
          TradingView-Skaleneinstellung Vorrang bekommt.
        */
        settings_overrides: buildScaleOverrides(
          scaleMode,
          mainAsset.color
        ),

        backgroundColor: "#ffffff",
        gridColor: "rgba(46, 46, 46, 0.08)",

        support_host: "https://www.tradingview.com"
      });

      widgetContainer.appendChild(widget);
      widgetContainer.appendChild(attribution);
      widgetContainer.appendChild(script);

      chartHost.replaceChildren(widgetContainer);

      writeStateToUrl(assets, range, scaleMode);

      const assetNames = assets
        .map((asset) => asset.name)
        .join(", ");

      let statusMessage =
        `${assets.length} Reihen · ${getScaleLabel(scaleMode)} · ` +
        `automatische Aktualisierung alle 60 Sekunden. ` +
        `Auswahl: ${assetNames}`;

      if (selectedAssets.length > MAX_RENDERED_SERIES) {
        statusMessage +=
          ` · Es sind ${selectedAssets.length} ausgewählt, ` +
          `angezeigt werden die ersten ${MAX_RENDERED_SERIES}.`;
      }

      if (scaleMode === "price" && assets.length > 1) {
        statusMessage +=
          " · Hinweis: Bei stark unterschiedlichen Preiseinheiten " +
          "können einzelne Reihen optisch sehr flach wirken.";
      }

      setStatus(statusMessage);

      document.title =
        `Rohstoff-CFD Vergleich – ${getScaleLabel(scaleMode)}`;
    }

    function scheduleRender() {
      clearTimeout(renderTimeout);

      renderTimeout = setTimeout(() => {
        renderTradingViewChart();
      }, 100);
    }

    document
      .getElementById("energy-only")
      .addEventListener("click", () => {
        selectOnlyGroup("Energy");
      });

    document
      .getElementById("standard-selection")
      .addEventListener("click", selectDefault);

    document
      .getElementById("select-all")
      .addEventListener("click", selectAll);

    document
      .getElementById("clear-all")
      .addEventListener("click", clearAll);

    document
      .getElementById("range-select")
      .addEventListener("change", scheduleRender);

    document.querySelectorAll(
      'input[name="scale-mode"]'
    ).forEach((input) => {
      input.addEventListener("change", scheduleRender);
    });

    document
      .getElementById("add-custom-symbol")
      .addEventListener("click", addCustomSymbol);

    document
      .getElementById("custom-symbol")
      .addEventListener("keydown", (event) => {
        if (event.key === "Enter") {
          addCustomSymbol();
        }
      });

    buildCommodityGroups();
    loadStateFromUrl();
    renderTradingViewChart();

    /*
      Der Chart wird zusätzlich jede Minute vollständig neu geladen.
      Dadurch wird die Auswahl behalten und aktuelle Daten werden
      erneut vom TradingView-Widget abgerufen.
    */
    setInterval(() => {
      renderTradingViewChart();
    }, AUTO_REFRESH_MS);
  </script>
</body>
</html>
