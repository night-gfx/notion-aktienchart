<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rohstoffvergleich</title>

  <!-- Fixed Lightweight Charts™ version. -->
  <script src="https://cdn.jsdelivr.net/npm/lightweight-charts@5.2.0/dist/lightweight-charts.standalone.production.js?v=20260629b"></script>

  <style>
    :root {
      --bg: #ffffff;
      --panel: #f8fafc;
      --border: #d8dee8;
      --text: #172033;
      --muted: #64748b;
      --primary: #1d4ed8;
      --primary-hover: #1e40af;
    }

    * { box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
    }

    body { overflow: hidden; }

    .app {
      display: flex;
      flex-direction: column;
      width: 100%;
      height: 100vh;
    }

    .controls {
      flex: 0 0 auto;
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
      background: var(--panel);
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px 10px;
      margin-bottom: 10px;
    }

    button {
      min-height: 31px;
      padding: 5px 9px;
      border: 1px solid #c7d0dd;
      border-radius: 6px;
      background: #ffffff;
      color: var(--text);
      font: inherit;
      font-size: 13px;
      cursor: pointer;
    }

    button:hover { background: #eef2f7; }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.55;
    }

    button:disabled:hover { background: #ffffff; }

    .primary {
      border-color: var(--primary);
      background: var(--primary);
      color: #ffffff;
    }

    .primary:hover { background: var(--primary-hover); }

    .control-label {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 31px;
      font-size: 13px;
      white-space: nowrap;
      cursor: pointer;
    }

    .period-box,
    .mode-box {
      display: inline-flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 5px;
      padding: 5px 6px;
      border: 1px solid var(--border);
      border-radius: 7px;
      background: #ffffff;
    }

    .period-title,
    .mode-title {
      margin-right: 3px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .period-button {
      min-height: 24px;
      padding: 2px 6px;
      border: 1px solid transparent;
      border-radius: 4px;
      background: transparent;
      font-size: 12px;
    }

    .period-button:hover { background: #eef2f7; }

    .period-button.active {
      border-color: #bfdbfe;
      background: #dbeafe;
      color: #1d4ed8;
      font-weight: 700;
    }

    .basis-button {
      min-width: 152px;
      text-align: left;
    }

    .groups {
      display: grid;
      grid-template-columns: 1fr;
      gap: 9px;
    }

    .workspace {
      display: flex;
      flex: 1 1 auto;
      min-height: 0;
    }

    .commodity-sidebar {
      flex: 0 0 clamp(300px, 31vw, 430px);
      overflow-y: auto;
      padding: 10px;
      border-right: 1px solid var(--border);
      background: var(--panel);
    }

    .commodity-group {
      padding: 8px 9px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #ffffff;
    }

    .group-title {
      margin: 0 0 8px;
    }

    .group-title button {
      width: 100%;
      min-height: 29px;
      border-color: #bfdbfe;
      background: #eff6ff;
      color: #1d4ed8;
      font-size: 13px;
      font-weight: 800;
      text-align: left;
    }

    .group-title button:hover { background: #dbeafe; }

    .commodity-list {
      display: grid;
      gap: 5px;
    }

    .commodity-item {
      display: flex;
      align-items: center;
      gap: 7px;
      min-height: 27px;
      padding: 4px 6px;
      border-left: 5px solid var(--series-color);
      border-radius: 4px;
      background: #fbfcfe;
      cursor: pointer;
      font-size: 12px;
    }

    .commodity-item:hover { background: #f0f4f8; }

    .commodity-name {
      flex: 1 1 auto;
      min-width: 0;
    }

    .ticker {
      color: var(--muted);
      font-size: 10px;
    }

    .commodity-percentile {
      flex: 0 0 70px;
      padding: 3px 5px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 800;
      text-align: center;
    }

    .status {
      margin-top: 10px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.4;
    }

    .chart-shell {
      position: relative;
      flex: 1 1 auto;
      min-height: 0;
      background: #ffffff;
    }

    #chart {
      width: 100%;
      height: 100%;
    }

    .legend {
      position: absolute;
      top: 9px;
      left: 12px;
      right: 70px;
      z-index: 5;
      display: flex;
      flex-wrap: wrap;
      gap: 6px 10px;
      pointer-events: none;
      font-size: 11px;
    }

    .legend-item {
      display: flex;
      flex-direction: column;
      gap: 2px;
      min-width: 86px;
      padding: 3px 5px;
      border-radius: 4px;
      background: rgba(255, 255, 255, 0.90);
      color: #334155;
    }

    .legend-title {
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }

    .legend-swatch {
      width: 14px;
      height: 3px;
      border-radius: 2px;
      flex: 0 0 auto;
    }

    .legend-price {
      padding-left: 19px;
      font-weight: 700;
    }

    .legend-timestamp {
      margin-left: 4px;
      color: var(--muted);
      font-size: 10px;
      font-weight: 400;
    }

    .tooltip {
      position: absolute;
      top: 64px;
      left: 12px;
      z-index: 6;
      display: none;
      max-width: min(340px, calc(100% - 24px));
      padding: 8px 9px;
      border: 1px solid rgba(148, 163, 184, 0.75);
      border-radius: 7px;
      background: rgba(255, 255, 255, 0.96);
      box-shadow: 0 4px 16px rgba(15, 23, 42, 0.12);
      color: #1e293b;
      font-size: 11px;
      line-height: 1.4;
      pointer-events: none;
    }

    .tooltip-date {
      margin-bottom: 4px;
      color: #475569;
      font-weight: 700;
    }

    .tooltip-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .tooltip-name {
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }

    .tooltip-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex: 0 0 auto;
    }

    .attribution {
      position: absolute;
      right: 8px;
      bottom: 5px;
      z-index: 5;
      color: #64748b;
      font-size: 10px;
    }

    .attribution a {
      color: #2962ff;
      text-decoration: none;
    }

    .empty-state {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      padding: 24px;
      color: var(--muted);
      text-align: center;
      font-size: 15px;
    }

    dialog {
      width: min(480px, calc(100vw - 28px));
      border: 1px solid #cbd5e1;
      border-radius: 10px;
      padding: 0;
      color: var(--text);
      font: inherit;
      box-shadow: 0 18px 55px rgba(15, 23, 42, 0.23);
    }

    dialog::backdrop {
      background: rgba(15, 23, 42, 0.34);
    }

    .dialog-body {
      padding: 18px;
    }

    .dialog-title {
      margin: 0 0 6px;
      font-size: 17px;
    }

    .dialog-subtitle {
      margin: 0 0 14px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.4;
    }

    .basis-options {
      display: grid;
      gap: 8px;
    }

    .basis-option {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 8px;
      border: 1px solid #e2e8f0;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
    }

    .basis-option:hover { background: #f8fafc; }

    .custom-date-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 8px;
      padding: 8px;
      border: 1px solid #e2e8f0;
      border-radius: 6px;
      font-size: 13px;
    }

    input[type="date"] {
      min-height: 31px;
      padding: 4px 6px;
      border: 1px solid #c7d0dd;
      border-radius: 5px;
      font: inherit;
      font-size: 13px;
    }

    .dialog-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 16px;
    }

    @media (max-width: 700px) {
      .workspace { flex-direction: column; }
      .commodity-sidebar {
        flex: 0 0 280px;
        border-right: 0;
        border-bottom: 1px solid var(--border);
      }
      .legend { right: 8px; }
    }
  </style>
</head>

<body>
  <main class="app">
    <section class="controls">
      <div class="toolbar">
        <button id="default-selection" type="button">Standard-Auswahl</button>
        <button id="select-all" type="button">Alle auswählen</button>
        <button id="clear-all" type="button">Alle abwählen</button>

        <div class="period-box" aria-label="Angezeigter Zeitraum">
          <span class="period-title">Anzeige:</span>
          <button class="period-button" data-range="1y" type="button">1J</button>
          <button class="period-button" data-range="3y" type="button">3J</button>
          <button class="period-button" data-range="5y" type="button">5J</button>
          <button class="period-button" data-range="10y" type="button">10J</button>
          <button class="period-button" data-range="20y" type="button">20J</button>
          <button class="period-button active" data-range="all" type="button">Alles</button>
        </div>

        <div class="mode-box" aria-label="Darstellungsart">
          <span class="mode-title">Darstellung:</span>

          <label class="control-label">
            <input type="radio" name="view-mode" value="price">
            Preis
          </label>

          <label class="control-label">
            <input type="radio" name="view-mode" value="indexed" checked>
            Index 100
          </label>

          <label class="control-label">
            <input type="radio" name="view-mode" value="log-return">
            Log-Performance
          </label>
        </div>

        <button id="basis-button" class="basis-button" type="button">
          Indexbasis: Anzeige-Start
        </button>
      </div>

      <div id="status" class="status">Laden: data/commodities_transformed.json wird heruntergeladen...</div>
    </section>

    <div class="workspace">
      <aside class="commodity-sidebar" aria-label="Rohstoffauswahl">
        <div id="commodity-groups" class="groups"></div>
      </aside>

      <section class="chart-shell">
        <div id="chart"></div>
        <div id="legend" class="legend"></div>
        <div id="tooltip" class="tooltip"></div>

        <div class="attribution">
          Charts by
          <a href="https://www.tradingview.com/" target="_blank" rel="noopener nofollow">
            TradingView
          </a>
          · Lightweight Charts™
        </div>
      </section>
    </div>
  </main>

  <dialog id="basis-dialog">
    <form method="dialog" class="dialog-body">
      <h2 class="dialog-title">Indexbasis festlegen</h2>
      <p class="dialog-subtitle">
        Diese Wahl beeinflusst nur <b>Index 100</b> und <b>Log-Performance</b>.
        Der Anzeigezeitraum oben bleibt davon getrennt.
      </p>

      <div class="basis-options">
        <label class="basis-option">
          <input type="radio" name="basis-choice" value="display-start" checked>
          Beginn des Anzeigezeitraums
        </label>

        <label class="basis-option">
          <input type="radio" name="basis-choice" value="1y">
          1 Jahr vor dem letzten verfügbaren Kurs
        </label>

        <label class="basis-option">
          <input type="radio" name="basis-choice" value="3y">
          3 Jahre vor dem letzten verfügbaren Kurs
        </label>

        <label class="basis-option">
          <input type="radio" name="basis-choice" value="5y">
          5 Jahre vor dem letzten verfügbaren Kurs
        </label>

        <label class="basis-option">
          <input type="radio" name="basis-choice" value="10y">
          10 Jahre vor dem letzten verfügbaren Kurs
        </label>

        <label class="basis-option">
          <input type="radio" name="basis-choice" value="20y">
          20 Jahre vor dem letzten verfügbaren Kurs
        </label>

        <label class="basis-option">
          <input type="radio" name="basis-choice" value="first-common">
          Erste gemeinsame Beobachtung aller ausgewählten Reihen
        </label>
      </div>

      <label class="custom-date-row">
        <input type="radio" name="basis-choice" value="custom">
        Eigenes Datum:
        <input id="custom-basis-date" type="date">
      </label>

      <div class="dialog-actions">
        <button id="basis-cancel" type="button">Abbrechen</button>
        <button id="basis-apply" class="primary" type="button">Übernehmen</button>
      </div>
    </form>
  </dialog>

  <script>
    /*
      Data source:
      The page reads raw data from data/commodities_transformed.json.
      This file contains:
      - data: original prices
      - first_price: first price (for indexing)
      - base_dates: reference dates (1y, 3y, etc.)
      
      Browser computes indexed and log_return dynamically based on basis choice.
    */

    const COMMODITY_GROUPS = {
      "Energy": [
        { ticker: "CL=F", name: "WTI Crude", nameDe: "WTI-Rohöl" },
        { ticker: "BZ=F", name: "Brent Crude", nameDe: "Brent-Rohöl" },
        { ticker: "NG=F", name: "Natural Gas", nameDe: "Erdgas" },
        { ticker: "RB=F", name: "RBOB Gasoline", nameDe: "RBOB-Benzin" },
        { ticker: "HO=F", name: "Heating Oil", nameDe: "Heizöl" }
      ],
      "Metals": [
        { ticker: "GC=F", name: "Gold", nameDe: "Gold" },
        { ticker: "SI=F", name: "Silver", nameDe: "Silber" },
        { ticker: "HG=F", name: "Copper", nameDe: "Kupfer" },
        { ticker: "PL=F", name: "Platinum", nameDe: "Platin" },
        { ticker: "PA=F", name: "Palladium", nameDe: "Palladium" },
        { ticker: "ALI=F", name: "Aluminum", nameDe: "Aluminium" }
      ],
      "Grains / Oilseeds": [
        { ticker: "ZC=F", name: "Corn", nameDe: "Mais" },
        { ticker: "ZW=F", name: "Wheat", nameDe: "Weizen" },
        { ticker: "KE=F", name: "KC HRW Wheat", nameDe: "KC-HRW-Weizen" },
        { ticker: "ZS=F", name: "Soybeans", nameDe: "Sojabohnen" },
        { ticker: "ZL=F", name: "Soybean Oil", nameDe: "Sojaöl" },
        { ticker: "ZM=F", name: "Soybean Meal", nameDe: "Sojaschrot" },
        { ticker: "ZO=F", name: "Oats", nameDe: "Hafer" },
        { ticker: "ZR=F", name: "Rough Rice", nameDe: "Rohreis" }
      ],
      "Softs": [
        { ticker: "KC=F", name: "Coffee", nameDe: "Kaffee" },
        { ticker: "SB=F", name: "Sugar", nameDe: "Zucker" },
        { ticker: "CC=F", name: "Cocoa", nameDe: "Kakao" },
        { ticker: "CT=F", name: "Cotton", nameDe: "Baumwolle" },
        { ticker: "OJ=F", name: "Orange Juice", nameDe: "Orangensaft" }
      ],
      "Livestock": [
        { ticker: "LE=F", name: "Live Cattle", nameDe: "Lebendrinder" },
        { ticker: "HE=F", name: "Lean Hogs", nameDe: "Magerschweine" },
        { ticker: "GF=F", name: "Feeder Cattle", nameDe: "Mastrinder" }
      ],
      "CO₂ Certificates": [
        { ticker: "CO2.L", name: "Physical Carbon EUA", nameDe: "EU-Emissionszertifikate" }
      ]
    };

    const DEFAULT_TICKERS = ["CL=F", "BZ=F", "NG=F", "GC=F", "HG=F", "ZC=F"];

    const COLOR_BY_TICKER = {
      "CL=F": "#003f5c", "BZ=F": "#ef5675", "NG=F": "#2f4b7c",
      "RB=F": "#ffa600", "HO=F": "#7a5195",
      "GC=F": "#c99700", "SI=F": "#6b7280", "HG=F": "#d04a02",
      "PL=F": "#5d9cec", "PA=F": "#a42cd6", "ALI=F": "#00a6a6",
      "ZC=F": "#6a994e", "ZW=F": "#bc6c25", "KE=F": "#99582a",
      "ZS=F": "#40916c", "ZL=F": "#e9c46a", "ZM=F": "#386641",
      "ZO=F": "#90be6d", "ZR=F": "#577590",
      "KC=F": "#6f4e37", "SB=F": "#e76f51", "CC=F": "#5f0f40",
      "CT=F": "#4d908e", "OJ=F": "#f77f00",
      "LE=F": "#9b2226", "HE=F": "#bb3e03", "GF=F": "#495057",
      "CO2.L": "#16a34a"
    };

    const ALL_COMMODITIES = Object.values(COMMODITY_GROUPS).flat();
    const AUTO_REFRESH_MS = 60 * 1000;

    let dataset = null;
    let chart = null;
    let seriesEntries = [];
    let resizeObserver = null;
    let fetchInProgress = false;
    let renderTimer = null;

    let displayRangeKey = "all";
    let indexBasisKey = "display-start";
    let customBasisDate = "";

    function getColor(ticker) {
      return COLOR_BY_TICKER[ticker] || "#1d4ed8";
    }

    function getCommodityDefinition(ticker) {
      return ALL_COMMODITIES.find((commodity) => commodity.ticker === ticker);
    }

    function getDisplayName(ticker, fallbackName = ticker) {
      const commodity = getCommodityDefinition(ticker);
      if (!commodity) return fallbackName;
      if (!commodity.nameDe) return commodity.name;
      return `${commodity.name} (${commodity.nameDe})`;
    }

    function setStatus(text) {
      document.getElementById("status").textContent = text;
    }

    function getViewMode() {
      const selected = document.querySelector('input[name="view-mode"]:checked');
      return selected ? selected.value : "indexed";
    }

    function getViewModeLabel(mode) {
      if (mode === "price") return "Preis";
      if (mode === "log-return") return "Log-Performance";
      return "Index 100";
    }

    function getDisplayRangeLabel() {
      const labels = {
        "1y": "letztes Jahr",
        "3y": "letzte 3 Jahre",
        "5y": "letzte 5 Jahre",
        "10y": "letzte 10 Jahre",
        "20y": "letzte 20 Jahre",
        "all": "gesamte Historie"
      };
      return labels[displayRangeKey] || "gesamte Historie";
    }

    function getBasisLabel() {
      const labels = {
        "display-start": "Anzeige-Start",
        "1y": "1 Jahr zurück",
        "3y": "3 Jahre zurück",
        "5y": "5 Jahre zurück",
        "10y": "10 Jahre zurück",
        "20y": "20 Jahre zurück",
        "first-common": "erste gemeinsame Beobachtung",
        "custom": customBasisDate ? customBasisDate : "eigenes Datum"
      };
      return labels[indexBasisKey] || "Anzeige-Start";
    }

    function formatDate(time) {
      if (typeof time === "string") {
        return new Intl.DateTimeFormat("de-DE", { dateStyle: "medium" })
          .format(new Date(`${time}T12:00:00Z`));
      }
      return "";
    }

    function formatValue(value, viewMode) {
      if (!Number.isFinite(value)) return "–";
      return value.toLocaleString("de-DE", {
        minimumFractionDigits: 2,
        maximumFractionDigits: 2
      });
    }

    function formatActualPrice(value) {
      if (!Number.isFinite(value)) return "–";
      return value.toLocaleString("de-DE", { maximumSignificantDigits: 7 });
    }

    function formatQuoteTimestamp(series) {
      if (series.last_quote_at) {
        const timestamp = new Date(series.last_quote_at);
        if (!Number.isNaN(timestamp.getTime())) {
          return new Intl.DateTimeFormat("de-DE", {
            dateStyle: "short",
            timeStyle: "short",
            timeZone: "Europe/Berlin"
          }).format(timestamp);
        }
      }

      const data = series.data || [];
      return data.length ? formatDate(data[data.length - 1][0]) : "–";
    }

    function subtractYears(dateString, years) {
      const [year, month, day] = dateString.split("-").map(Number);
      const date = new Date(Date.UTC(year - years, month - 1, day));
      return date.toISOString().slice(0, 10);
    }

    function updatePeriodButtons() {
      document.querySelectorAll(".period-button").forEach((button) => {
        button.classList.toggle(
          "active",
          button.dataset.range === displayRangeKey
        );
      });
    }

    function updateBasisButton() {
      const button = document.getElementById("basis-button");
      const isPriceMode = getViewMode() === "price";
      button.disabled = isPriceMode;
      button.textContent = isPriceMode
        ? "Indexbasis: nur bei Index / Log"
        : `Indexbasis: ${getBasisLabel()}`;
    }

    function getSelectedSeries() {
      if (!dataset?.series) return [];
      const selectedTickers = new Set(
        Array.from(document.querySelectorAll(".commodity-checkbox:checked"))
          .map((checkbox) => checkbox.value)
      );
      return dataset.series.filter((series) => selectedTickers.has(series.ticker));
    }

    function getSeriesPoints(series, viewMode, basisDate) {
      const rawData = series.data || [];
      if (rawData.length === 0) return [];

      // Find base price based on view mode and basis date
      let basePrice = null;

      if (viewMode === "price") {
        // No indexing needed
        return rawData
          .map(([time, value]) => ({
            time,
            value: Number(value)
          }))
          .filter((point) => Number.isFinite(point.value) && point.value > 0)
          .sort((a, b) => a.time.localeCompare(b.time));
      }

      // For indexed and log-return modes, find base price
      if (basisDate) {
        // Find first data point on or after basisDate
        for (const [date, price] of rawData) {
          if (date >= basisDate) {
            basePrice = Number(price);
            break;
          }
        }
      }

      // If no price found on or after basisDate, use first valid price
      if (basePrice === null || !Number.isFinite(basePrice) || basePrice <= 0) {
        for (const [date, price] of rawData) {
          const p = Number(price);
          if (Number.isFinite(p) && p > 0) {
            basePrice = p;
            break;
          }
        }
      }

      if (basePrice === null || basePrice <= 0) return [];

      // Transform data based on view mode
      return rawData
        .map(([time, value]) => {
          const v = Number(value);
          if (!Number.isFinite(v) || v <= 0) return null;

          let transformedValue;
          if (viewMode === "indexed") {
            transformedValue = (v / basePrice) * 100;
          } else if (viewMode === "log-return") {
            transformedValue = 100 * Math.log(v / basePrice);
          } else {
            transformedValue = v;
          }

          return {
            time,
            value: transformedValue
          };
        })
        .filter((point) => point !== null)
        .sort((a, b) => a.time.localeCompare(b.time));
    }

    function getLatestDate(selectedSeries) {
      const dates = selectedSeries
        .map((series) => {
          const data = series.data || [];
          return data.length ? data[data.length - 1][0] : null;
        })
        .filter(Boolean)
        .sort();
      return dates.length ? dates[dates.length - 1] : null;
    }

    function getDisplayStartDate(latestDate) {
      if (!latestDate || displayRangeKey === "all") return null;
      const years = Number.parseInt(displayRangeKey, 10);
      if (!Number.isFinite(years)) return null;
      return subtractYears(latestDate, years);
    }

    function getFirstCommonDate(selectedSeries) {
      const firstDates = selectedSeries
        .map((series) => {
          const data = series.data || [];
          return data.length ? data[0][0] : null;
        })
        .filter(Boolean)
        .sort();
      return firstDates.length ? firstDates[firstDates.length - 1] : null;
    }

    function getBasisTargetDate(selectedSeries, latestDate, displayStartDate) {
      // If basis is "display-start", use the display start date (which may be null for "all")
      if (indexBasisKey === "display-start") {
        // If displayStartDate is null (meaning "all" is selected), use first data point
        return displayStartDate || getFirstCommonDate(selectedSeries);
      }

      if (indexBasisKey === "first-common") {
        return getFirstCommonDate(selectedSeries);
      }

      if (indexBasisKey === "custom") {
        return customBasisDate || displayStartDate || getFirstCommonDate(selectedSeries);
      }

      // Parse numeric basis (1y, 3y, 5y, 10y, 20y)
      const years = Number.parseInt(indexBasisKey, 10);
      if (Number.isFinite(years) && latestDate) {
        return subtractYears(latestDate, years);
      }

      return displayStartDate || getFirstCommonDate(selectedSeries);
    }

    function getTimeline(selectedSeries) {
      return [...new Set(
        selectedSeries.flatMap((series) =>
          (series.data || []).map((point) => point[0])
        )
      )].sort();
    }

    function getLogicalDisplayRange(timeline, displayStartDate) {
      if (!timeline.length) {
        return null;
      }
      if (!displayStartDate) {
        // Let the chart fit the complete time scale natively.
        return null;
      }
      const firstVisibleIndex = timeline.findIndex(
        (time) => time >= displayStartDate
      );
      if (firstVisibleIndex === -1) {
        return null;
      }
      return {
        from: Math.max(-0.5, firstVisibleIndex - 0.5),
        to: timeline.length + 0.5
      };
    }

    function applyDisplayViewport(logicalRange) {
      if (!chart) return;
      const apply = () => {
        if (!chart) return;
        if (logicalRange) {
          chart.timeScale().setVisibleLogicalRange(logicalRange);
        } else {
          chart.timeScale().fitContent();
        }
      };
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          apply();
          window.setTimeout(apply, 120);
        });
      });
    }

    function getLatestActualPrice(series) {
      const data = series.data || [];
      return data.length ? Number(data[data.length - 1][1]) : NaN;
    }

    function getPricePercentile(series) {
      const prices = (series.data || [])
        .map((point) => Number(point[1]))
        .filter((value) => Number.isFinite(value) && value > 0)
        .sort((a, b) => a - b);
      if (!prices.length) return NaN;
      if (prices.length === 1) return 50;

      const latest = getLatestActualPrice(series);
      if (!Number.isFinite(latest) || latest <= 0) return NaN;
      const firstIndex = prices.findIndex((value) => value >= latest);
      let lastIndex = prices.length - 1;
      for (let index = prices.length - 1; index >= 0; index -= 1) {
        if (prices[index] <= latest) {
          lastIndex = index;
          break;
        }
      }
      const averageRank = (Math.max(0, firstIndex) + lastIndex) / 2;
      return (averageRank / (prices.length - 1)) * 100;
    }

    function getPercentileColors(percentile) {
      const bounded = Math.max(0, Math.min(100, percentile));
      const hue = 120 - (bounded * 1.2);
      return {
        background: `hsl(${hue} 72% 82%)`,
        text: `hsl(${hue} 72% 24%)`
      };
    }

    function buildControls() {
      const root = document.getElementById("commodity-groups");
      const existingCheckboxes = Array.from(
        root.querySelectorAll(".commodity-checkbox")
      );
      const preserveSelection = existingCheckboxes.length > 0;
      const selectedTickers = new Set(
        existingCheckboxes
          .filter((checkbox) => checkbox.checked)
          .map((checkbox) => checkbox.value)
      );
      root.innerHTML = "";

      Object.entries(COMMODITY_GROUPS).forEach(([groupName, commodities]) => {
        const group = document.createElement("section");
        group.className = "commodity-group";

        const title = document.createElement("h3");
        title.className = "group-title";
        const groupButton = document.createElement("button");
        groupButton.type = "button";
        groupButton.textContent = groupName;
        groupButton.title =
          `Alle Rohstoffe aus ${groupName} auswählen oder abwählen`;
        groupButton.addEventListener("click", () => {
          const tickers = new Set(commodities.map((item) => item.ticker));
          const checkboxes = Array.from(
            document.querySelectorAll(".commodity-checkbox")
          ).filter((checkbox) => tickers.has(checkbox.value));
          const allSelected = checkboxes.every((checkbox) => checkbox.checked);
          checkboxes.forEach((checkbox) => {
            checkbox.checked = !allSelected;
          });
          requestRender();
        });
        title.appendChild(groupButton);

        const list = document.createElement("div");
        list.className = "commodity-list";

        commodities.forEach((commodity) => {
          const label = document.createElement("label");
          label.className = "commodity-item";
          label.style.setProperty("--series-color", getColor(commodity.ticker));

          const checkbox = document.createElement("input");
          checkbox.type = "checkbox";
          checkbox.className = "commodity-checkbox";
          checkbox.value = commodity.ticker;
          checkbox.checked = preserveSelection
            ? selectedTickers.has(commodity.ticker)
            : DEFAULT_TICKERS.includes(commodity.ticker);
          checkbox.addEventListener("change", requestRender);

          const name = document.createElement("span");
          name.className = "commodity-name";
          name.textContent = getDisplayName(commodity.ticker, commodity.name);

          const ticker = document.createElement("span");
          ticker.className = "ticker";
          ticker.textContent = ` (${commodity.ticker})`;

          const series = dataset?.series?.find(
            (item) => item.ticker === commodity.ticker
          );
          const percentile = series ? getPricePercentile(series) : NaN;
          const percentileBadge = document.createElement("span");
          percentileBadge.className = "commodity-percentile";
          if (Number.isFinite(percentile)) {
            const colors = getPercentileColors(percentile);
            percentileBadge.textContent = `${percentile.toLocaleString("de-DE", {
              minimumFractionDigits: 1,
              maximumFractionDigits: 1
            })} %`;
            percentileBadge.style.background = colors.background;
            percentileBadge.style.color = colors.text;
            percentileBadge.title =
              `Aktuelles Preisperzentil: ${percentileBadge.textContent}`;
          } else {
            percentileBadge.textContent = "–";
            percentileBadge.style.background = "#f1f5f9";
            percentileBadge.style.color = "#64748b";
            percentileBadge.title = "Keine Kursdaten verfügbar";
          }

          name.appendChild(ticker);
          label.append(checkbox, name, percentileBadge);
          list.appendChild(label);
        });

        group.append(title, list);
        root.appendChild(group);
      });
    }

    function setCheckedTickers(tickers) {
      document.querySelectorAll(".commodity-checkbox").forEach((checkbox) => {
        checkbox.checked = tickers.includes(checkbox.value);
      });
    }

    function resetChart() {
      if (chart) chart.remove();
      chart = null;
      seriesEntries = [];
    }

    function createChart() {
      const chartElement = document.getElementById("chart");
      chartElement.innerHTML = "";
      chart = window.LightweightCharts.createChart(chartElement, {
        layout: { background: { color: "#ffffff" } },
        grid: {
          vertLines: { visible: false },
          horzLines: { visible: false }
        },
        rightPriceScale: { borderVisible: false },
        timeScale: {
          timeVisible: true,
          secondsVisible: false,
          borderVisible: false,
          minBarSpacing: 0.01
        }
      });
    }

    function syncTooltip(param) {
      const tooltip = document.getElementById("tooltip");
      if (param.point === undefined || !param.time) {
        tooltip.style.display = "none";
        return;
      }

      const rows = seriesEntries
        .filter((entry) => entry.api)
        .map((entry) => {
          const data = entry.points || (entry.api && typeof entry.api.data === 'function' ? entry.api.data() : []);
          const point = data.find((p) => p.time === param.time);
          if (!point) return "";

          const value = formatValue(point.value, getViewMode());
          return `
            <div class="tooltip-row">
              <div class="tooltip-name">
                <div class="tooltip-dot" style="background: ${entry.color}"></div>
                ${entry.name}
              </div>
              <div>${value}</div>
            </div>
          `;
        })
        .filter(Boolean);

      tooltip.innerHTML = `
        <div class="tooltip-date">${formatDate(param.time)}</div>
        ${rows.join("")}
      `;
      tooltip.style.display = "block";
    }

    function renderChart() {
      if (!dataset) return;

      const legend = document.getElementById("legend");
      legend.innerHTML = "";
      const tooltip = document.getElementById("tooltip");
      tooltip.innerHTML = "";
      tooltip.style.display = "none";

      const selectedSeries = getSelectedSeries();
      if (selectedSeries.length === 0) {
        resetChart();
        document.getElementById("chart").innerHTML =
          '<div class="empty-state">Wählen Sie Rohstoffe aus</div>';
        return;
      }

      resetChart();
      createChart();

      const latestDate = getLatestDate(selectedSeries);
      const displayStartDate = getDisplayStartDate(latestDate);
      const basisTargetDate = getBasisTargetDate(selectedSeries, latestDate, displayStartDate);
      const viewMode = getViewMode();

      seriesEntries = selectedSeries.map((series) => {
        const points = getSeriesPoints(series, viewMode, basisTargetDate);
        const lineSeries = chart.addSeries(window.LightweightCharts.LineSeries, {
          color: getColor(series.ticker)
        });
        lineSeries.setData(points);

        const legendItem = document.createElement("div");
        legendItem.className = "legend-item";
        const latestPrice = points.length > 0 ? points[points.length - 1].value : NaN;

        legendItem.innerHTML = `
          <div class="legend-title">
            <div class="legend-swatch" style="background: ${getColor(series.ticker)}"></div>
            <strong>${getDisplayName(series.ticker, series.name)}</strong>
          </div>
          <div class="legend-price">
            ${formatValue(latestPrice, viewMode)}
            <span class="legend-timestamp">
              · ${formatQuoteTimestamp(series)} Uhr
            </span>
          </div>
        `;
        legend.appendChild(legendItem);

        return {
          api: lineSeries,
          points,
          color: getColor(series.ticker),
          name: getDisplayName(series.ticker, series.name)
        };
      });

      chart.subscribeCrosshairMove(syncTooltip);

      const timeline = getTimeline(selectedSeries);
      const logicalRange = getLogicalDisplayRange(timeline, displayStartDate);
      applyDisplayViewport(logicalRange);
    }

    function requestRender() {
      if (renderTimer) clearTimeout(renderTimer);
      renderTimer = setTimeout(renderChart, 100);
    }

    function initEventListeners() {
      // Period buttons
      document.querySelectorAll(".period-button").forEach((button) => {
        button.addEventListener("click", () => {
          displayRangeKey = button.dataset.range;
          updatePeriodButtons();
          requestRender();
        });
      });

      // View mode change
      document.querySelectorAll('input[name="view-mode"]').forEach((radio) => {
        radio.addEventListener("change", () => {
          updateBasisButton();
          requestRender();
        });
      });

      // Basis button
      document.getElementById("basis-button").addEventListener("click", () => {
        const dialog = document.getElementById("basis-dialog");
        const choice = document.querySelector('input[name="basis-choice"]:checked');
        if (choice) {
          document.querySelector(`input[name="basis-choice"][value="${choice.value}"]`).checked = true;
          if (choice.value === "custom") {
            document.getElementById("custom-basis-date").value = customBasisDate;
          }
        }
        dialog.showModal();
      });

      document.getElementById("basis-apply").addEventListener("click", () => {
        const choice = document.querySelector('input[name="basis-choice"]:checked');
        if (choice) {
          indexBasisKey = choice.value;
          if (indexBasisKey === "custom") {
            customBasisDate = document.getElementById("custom-basis-date").value;
          }
          updateBasisButton();
          requestRender();
        }
      });

      document.getElementById("basis-cancel").addEventListener("click", () => {
        document.getElementById("basis-dialog").close();
      });

      // Selection buttons
      document.getElementById("default-selection").addEventListener("click", () => {
        setCheckedTickers(DEFAULT_TICKERS);
        requestRender();
      });

      document.getElementById("select-all").addEventListener("click", () => {
        setCheckedTickers(ALL_COMMODITIES.map((c) => c.ticker));
        requestRender();
      });

      document.getElementById("clear-all").addEventListener("click", () => {
        setCheckedTickers([]);
        requestRender();
      });
    }

    async function loadData() {
      if (fetchInProgress) return;
      fetchInProgress = true;
      setStatus("Laden: data/commodities_transformed.json wird heruntergeladen...");

      try {
        const response = await fetch("data/commodities_transformed.json");
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        dataset = await response.json();

        if (!dataset?.series || !Array.isArray(dataset.series)) {
          throw new Error("Invalid data format");
        }

        setStatus("");
        buildControls();
        renderChart();
      } catch (error) {
        setStatus(`Fehler beim Laden: ${error.message}`);
        console.error(error);
      } finally {
        fetchInProgress = false;
      }
    }

    function setupResizeObserver() {
      const chartContainer = document.querySelector(".chart-shell");
      resizeObserver = new ResizeObserver(() => {
        if (chart) {
          setTimeout(() => {
            if (chart) chart.applyOptions({ width: chartContainer.clientWidth });
          }, 0);
        }
      });
      resizeObserver.observe(chartContainer);
    }

    window.addEventListener("DOMContentLoaded", () => {
      initEventListeners();
      setupResizeObserver();
      loadData();

      setInterval(() => {
        if (!fetchInProgress) loadData();
      }, AUTO_REFRESH_MS);
    });
  </script>
</body>
</html>
