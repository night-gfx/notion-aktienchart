<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />
  <title>Rohstoffvergleich</title>

  <style>
    :root {
      --border: #dedede;
      --background: #ffffff;
      --panel: #fafafa;
      --text: #1f1f1f;
      --muted: #666666;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      background: var(--background);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      overflow: hidden;
    }

    .page {
      display: flex;
      flex-direction: column;
      width: 100%;
      height: 100vh;
      box-sizing: border-box;
    }

    .controls {
      flex: 0 0 auto;
      max-height: 255px;
      overflow-y: auto;
      box-sizing: border-box;
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
      background: var(--panel);
    }

    .control-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px 12px;
      margin-bottom: 10px;
    }

    button {
      padding: 6px 10px;
      border: 1px solid #cfcfcf;
      border-radius: 6px;
      background: #ffffff;
      color: var(--text);
      font-size: 13px;
      cursor: pointer;
    }

    button:hover {
      background: #f0f0f0;
    }

    .control-row label {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      cursor: pointer;
    }

    .status {
      font-size: 12px;
      color: var(--muted);
      margin-top: 2px;
    }

    .groups {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
      gap: 8px;
    }

    details {
      background: #ffffff;
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 7px 9px;
    }

    summary {
      cursor: pointer;
      font-size: 13px;
      font-weight: 700;
      user-select: none;
    }

    .commodity-list {
      display: grid;
      grid-template-columns: 1fr;
      gap: 5px;
      margin-top: 8px;
    }

    .commodity-list label {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      cursor: pointer;
    }

    .ticker {
      color: #777777;
      font-size: 11px;
    }

    .chart-area {
      flex: 1 1 auto;
      min-height: 0;
      width: 100%;
      background: #ffffff;
    }

    .tradingview-widget-container,
    .tradingview-widget-container__widget {
      width: 100%;
      height: 100%;
    }

    .tradingview-widget-copyright {
      display: none;
    }

    @media (max-width: 700px) {
      .controls {
        max-height: 300px;
      }

      .groups {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <div class="page">

    <div class="controls">
      <div class="control-row">
        <button id="default-selection" type="button">
          Standard-Auswahl
        </button>

        <button id="select-all" type="button">
          Alle auswählen
        </button>

        <button id="clear-all" type="button">
          Alle abwählen
        </button>

        <button id="update-chart" type="button">
          Diagramm aktualisieren
        </button>

        <label>
          <input id="log-scale" type="checkbox" checked />
          Logarithmische Skala
        </label>
      </div>

      <div class="groups" id="commodity-groups"></div>

      <div class="status" id="status">
        Standard-Auswahl wird geladen.
      </div>
    </div>

    <div class="chart-area">
      <div class="tradingview-widget-container">
        <div
          id="tradingview-chart"
          class="tradingview-widget-container__widget"
        ></div>
      </div>
    </div>

  </div>

  <script>
    /*
      TradingView-Symbole für kontinuierliche Futures.

      Diese unterscheiden sich von Yahoo-Tickern wie CL=F oder GC=F.
      Beispiel:
      Yahoo:       CL=F
      TradingView: NYMEX:CL1!
    */
    const COMMODITY_GROUPS = {
      "Energy": [
        { name: "WTI Crude", symbol: "NYMEX:CL1!" },
        { name: "Brent Crude", symbol: "ICEEUR:BRN1!" },
        { name: "Natural Gas", symbol: "NYMEX:NG1!" },
        { name: "RBOB Gasoline", symbol: "NYMEX:RB1!" },
        { name: "Heating Oil", symbol: "NYMEX:HO1!" }
      ],

      "Metals": [
        { name: "Gold", symbol: "COMEX:GC1!" },
        { name: "Silver", symbol: "COMEX:SI1!" },
        { name: "Copper", symbol: "COMEX:HG1!" },
        { name: "Platinum", symbol: "NYMEX:PL1!" },
        { name: "Palladium", symbol: "NYMEX:PA1!" }
      ],

      "Grains / Oilseeds": [
        { name: "Corn", symbol: "CBOT:ZC1!" },
        { name: "Wheat", symbol: "CBOT:ZW1!" },
        { name: "Soybeans", symbol: "CBOT:ZS1!" },
        { name: "Soybean Oil", symbol: "CBOT:ZL1!" },
        { name: "Soybean Meal", symbol: "CBOT:ZM1!" }
      ],

      "Softs": [
        { name: "Coffee", symbol: "ICEUS:KC1!" },
        { name: "Sugar", symbol: "ICEUS:SB1!" },
        { name: "Cocoa", symbol: "ICEUS:CC1!" },
        { name: "Cotton", symbol: "ICEUS:CT1!" },
        { name: "Orange Juice", symbol: "ICEUS:OJ1!" }
      ],

      "Livestock": [
        { name: "Live Cattle", symbol: "CME:LE1!" },
        { name: "Lean Hogs", symbol: "CME:HE1!" }
      ]
    };

    /*
      Diese Rohstoffe werden beim ersten Laden angezeigt.
      Zu viele Reihen in einem Chart werden schnell unübersichtlich.
    */
    const DEFAULT_SYMBOLS = [
      "NYMEX:CL1!",
      "ICEEUR:BRN1!",
      "COMEX:GC1!",
      "COMEX:SI1!",
      "COMEX:HG1!",
      "CBOT:ZC1!"
    ];

    function buildCommoditySelection() {
      const container = document.getElementById("commodity-groups");
      container.innerHTML = "";

      Object.entries(COMMODITY_GROUPS).forEach(([groupName, commodities], index) => {
        const details = document.createElement("details");

        if (index < 2) {
          details.open = true;
        }

        const summary = document.createElement("summary");
        summary.textContent = groupName;
        details.appendChild(summary);

        const list = document.createElement("div");
        list.className = "commodity-list";

        commodities.forEach((commodity) => {
          const label = document.createElement("label");

          const checkbox = document.createElement("input");
          checkbox.type = "checkbox";
          checkbox.className = "commodity-checkbox";
          checkbox.value = commodity.symbol;
          checkbox.dataset.name = commodity.name;

          checkbox.checked = DEFAULT_SYMBOLS.includes(commodity.symbol);

          const text = document.createElement("span");
          text.innerHTML = `
            ${commodity.name}
            <span class="ticker">(${commodity.symbol})</span>
          `;

          label.appendChild(checkbox);
          label.appendChild(text);
          list.appendChild(label);
        });

        details.appendChild(list);
        container.appendChild(details);
      });
    }

    function getSelectedCommodities() {
      return Array.from(
        document.querySelectorAll(".commodity-checkbox:checked")
      ).map((checkbox) => ({
        name: checkbox.dataset.name,
        symbol: checkbox.value
      }));
    }

    function setSelectedSymbols(symbols) {
      const selected = new Set(symbols);

      document.querySelectorAll(".commodity-checkbox").forEach((checkbox) => {
        checkbox.checked = selected.has(checkbox.value);
      });
    }

    function setStatus(text) {
      document.getElementById("status").textContent = text;
    }

    function renderTradingViewChart() {
      const selected = getSelectedCommodities();
      const logScale = document.getElementById("log-scale").checked;
      const chartContainer = document.getElementById("tradingview-chart");

      if (selected.length === 0) {
        chartContainer.innerHTML = `
          <div style="
            height:100%;
            display:flex;
            align-items:center;
            justify-content:center;
            color:#666;
            font-size:15px;
          ">
            Bitte mindestens einen Rohstoff auswählen.
          </div>
        `;

        setStatus("Keine Zeitreihe ausgewählt.");
        return;
      }

      /*
        Der erste ausgewählte Rohstoff ist die Hauptserie.
        Alle weiteren Rohstoffe werden als Vergleichsreihen hinzugefügt.
      */
      const mainSymbol = selected[0];

      const compareSymbols = selected.slice(1).map((commodity) => ({
        symbol: commodity.symbol,
        position: "SameScale"
      }));

      chartContainer.innerHTML = "";

      const chartScript = document.createElement("script");

      chartScript.type = "text/javascript";
      chartScript.src =
        "https://s3.tradingview.com/external-embedding/embed-widget-advanced-chart.js";

      chartScript.async = true;

      chartScript.innerHTML = JSON.stringify({
        autosize: true,

        symbol: mainSymbol.symbol,
        interval: "D",
        timezone: "Europe/Berlin",
        theme: "light",
        locale: "de_DE",

        /*
          style 3 = Linien-/Flächenchart statt Candlesticks
        */
        style: "3",

        /*
          Die obere Leiste bleibt sichtbar:
          - Zeiträume anpassen
          - weitere Vergleichsreihen prüfen
          - Chart-Einstellungen öffnen
        */
        hide_top_toolbar: false,

        /*
          Linke Zeichenleiste, Volumen und Zusatzmodule ausblenden.
        */
        hide_side_toolbar: true,
        hide_volume: true,
        hide_legend: false,
        withdateranges: true,

        allow_symbol_change: true,
        save_image: false,
        calendar: false,
        details: false,
        hotlist: false,
        watchlist: [],
        studies: [],

        /*
          Weitere Rohstoffe im selben Diagramm.
        */
        compareSymbols: compareSymbols,

        /*
          Logarithmische Preisachse.
          Der Wert wird bei jedem Klick auf
          „Diagramm aktualisieren“ neu gesetzt.
        */
        overrides: {
          "mainSeriesProperties.priceAxisProperties.log": logScale
        },

        backgroundColor: "#ffffff",
        gridColor: "rgba(46, 46, 46, 0.06)",

        support_host: "https://www.tradingview.com"
      });

      chartContainer.appendChild(chartScript);

      const selectedNames = selected
        .map((commodity) => commodity.name)
        .join(", ");

      setStatus(
        `${selected.length} Rohstoffe geladen: ${selectedNames}`
      );
    }

    document
      .getElementById("default-selection")
      .addEventListener("click", () => {
        setSelectedSymbols(DEFAULT_SYMBOLS);
        renderTradingViewChart();
      });

    document
      .getElementById("select-all")
      .addEventListener("click", () => {
        const allSymbols = Object.values(COMMODITY_GROUPS)
          .flat()
          .map((commodity) => commodity.symbol);

        setSelectedSymbols(allSymbols);
        renderTradingViewChart();
      });

    document
      .getElementById("clear-all")
      .addEventListener("click", () => {
        setSelectedSymbols([]);
        renderTradingViewChart();
      });

    document
      .getElementById("update-chart")
      .addEventListener("click", renderTradingViewChart);

    document
      .getElementById("log-scale")
      .addEventListener("change", renderTradingViewChart);

    buildCommoditySelection();
    renderTradingViewChart();
  </script>
</body>
</html>
